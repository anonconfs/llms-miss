# .github/workflows/ci-failure-summary.yml
name: Summarize CI Failures

on:
  workflow_run:
    # Replace "CI" with the name: of the workflow(s) you want monitored.
    # Use ["*"] to catch all workflows in this repo.
    workflows: ["Tests", "ty"]
    types: [completed]

permissions:
  id-token: write
  contents: read
  issues: write
  pull-requests: write
  actions: read

jobs:
  summarize:
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    runs-on: ubuntu-latest
    steps:
      - name: Summarize failure with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          claude_args: |
            --model claude-haiku-4-5
            --allowedTools "Bash(gh run view:*),Bash(gh run download:*),Bash(gh api:*),Bash(gh pr comment:*),Bash(gh pr list:*),Bash(gh issue create:*),Bash(cat:*),Bash(head:*),Bash(tail:*),Bash(grep:*),Bash(wc:*),Bash(ls:*)"
          prompt: |
            A CI run just failed. Investigate and post a concise summary.

            Context:
            - Repo: ${{ github.repository }}
            - Failed run ID: ${{ github.event.workflow_run.id }}
            - Failed run URL: ${{ github.event.workflow_run.html_url }}
            - Workflow name: ${{ github.event.workflow_run.name }}
            - Branch: ${{ github.event.workflow_run.head_branch }}
            - Commit SHA: ${{ github.event.workflow_run.head_sha }}
            - Associated PR number (if any): ${{ github.event.workflow_run.pull_requests[0].number }}

            Do the following:
            1. Use `gh run view ${{ github.event.workflow_run.id }} --repo ${{ github.repository }} --log-failed` to fetch logs from only the failed jobs/steps. This output can be large — pipe through `tail -n 500` or `grep` around error markers rather than dumping it all into context.
            2. Identify the root cause. If multiple jobs failed with the same underlying cause, consolidate. If causes differ, list them separately.
            3. Write a short markdown summary with this structure:
               - **Summary** — 1–2 sentences on what broke
               - **Root cause** — the specific error, with the key log line in a fenced code block
               - **Suggested fix** — concrete next steps
               Keep it terse. No preamble, no filler.
            4. Post the summary:
               - If PR number is set (not empty), comment on it: `gh pr comment <number> --repo ${{ github.repository }} --body-file <file>`
               - Otherwise, resolve the PR via `gh api repos/${{ github.repository }}/commits/${{ github.event.workflow_run.head_sha }}/pulls --jq '.[0].number'` and comment there if found
               - If still no PR, open an issue titled "CI failure on ${{ github.event.workflow_run.head_branch }} @ <short-sha>" with the summary as the body
            5. Prepend this header to whatever you post:
               `🤖 **CI failure summary** for [\`<short-sha>\`](${{ github.event.workflow_run.html_url }}) on \`${{ github.event.workflow_run.head_branch }}\``
               and append: `\n\n---\n_Generated by Claude Haiku 4.5._`

            Write the body to a temp file first (e.g. `/tmp/summary.md`) and use `--body-file` so markdown formatting survives intact.
