name: claude-issue-worker.yml
on:
  issue_comment:
    types: [created]

jobs:
  claude-fix:
    # Only run on issue comments (not PR comments) by YOU
    if: |
      github.event.issue.pull_request == null &&
      github.event.comment.user.login == 'Draggon01' &&
      contains(github.event.comment.body, '@claude')

    runs-on: [self-hosted, pi, claude]

    permissions:
      contents: write
      issues: write
      pull-requests: write

    timeout-minutes: 30   # Hard cap on run time = implicit cost cap

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup branch
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cd $GITHUB_WORKSPACE
          git config user.name "Claude Bot"
          git config user.email "claude-bot@noreply"

          BRANCH="claude/fix-issue-${ISSUE_NUMBER}"
          if git ls-remote --exit-code --heads origin "$BRANCH"; then
            git fetch origin "$BRANCH"
            git checkout "$BRANCH"
            git pull origin "$BRANCH"
          else
            git checkout -b "$BRANCH"
          fi

      # ── Pre-load context so Claude skips exploration turns ──────────────────
      - name: Gather repo context
        id: context
        run: |
          cd $GITHUB_WORKSPACE

          # File tree (excluding noise)
          TREE=$(find . \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -not -path './.next/*' \
            -not -path './dist/*' \
            -not -path './build/*' \
            -not -path './__pycache__/*' \
            | sort | head -100)

          # CLAUDE.md content
          CLAUDE_MD=""
          if [ -f "CLAUDE.md" ]; then
            CLAUDE_MD=$(cat CLAUDE.md)
          fi

          # Recent git log for context on resuming
          GIT_LOG=$(git log --oneline -10)

          # Write to files to avoid env size limits
          echo "$TREE" > /tmp/repo_tree.txt
          echo "$CLAUDE_MD" > /tmp/claude_md.txt
          echo "$GIT_LOG" > /tmp/git_log.txt

          echo "Context gathered: $(wc -l < /tmp/repo_tree.txt) tree lines, $(wc -c < /tmp/claude_md.txt) CLAUDE.md bytes"

      # ── Step 1: Plan (max 8 turns) ──────────────────────────────────────────
      - name: Claude — Plan
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          TRIGGER_COMMENT: ${{ github.event.comment.body }}
          REPO: ${{ github.repository }}
        run: |
          cd $GITHUB_WORKSPACE

          TREE=$(cat /tmp/repo_tree.txt)
          CLAUDE_MD=$(cat /tmp/claude_md.txt)

          PLAN_PROMPT="You are a senior developer working on the GitHub repository '${REPO}'.

          ## Project context (read carefully — do NOT re-read these files, this is already current):
          ### CLAUDE.md:
          ${CLAUDE_MD}

          ### Repository file tree:
          ${TREE}

          ## Your task:
          Analyze issue #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          Issue description:
          ${ISSUE_BODY}

          Trigger comment:
          ${TRIGGER_COMMENT}

          ## Output instructions:
          Respond ONLY with a JSON object (no markdown, no preamble) in this exact shape:
          {
            \"files_to_change\": [\"path/to/file1\", \"path/to/file2\"],
            \"files_to_read_first\": [\"path/to/file\"],
            \"approach\": \"clear description of what will be changed and why\",
            \"test_files\": [\"path/to/test\"],
            \"risks\": [\"potential risk or edge case\"],
            \"estimated_turns\": 10
          }"

          claude -p "$PLAN_PROMPT" \
            --max-turns 8 \
            --allowedTools "Read,Grep,Glob" \
            --output-format json \
            > /tmp/plan-output.json 2>&1

          echo "=== Plan output ==="
          cat /tmp/plan-output.json

          # Extract the plan result for the next step
          PLAN=$(cat /tmp/plan-output.json | jq -r '.result // ""')
          echo "$PLAN" > /tmp/plan.txt

          PLAN_COST=$(cat /tmp/plan-output.json | jq -r '.total_cost_usd // 0')
          PLAN_TURNS=$(cat /tmp/plan-output.json | jq -r '.num_turns // 0')
          echo "PLAN_COST=$PLAN_COST" >> $GITHUB_ENV
          echo "PLAN_TURNS=$PLAN_TURNS" >> $GITHUB_ENV
          echo "Plan used $PLAN_TURNS turns, cost \$$PLAN_COST"

      # ── Step 2: Execute (max 25 turns) ──────────────────────────────────────
      - name: Claude — Execute
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          REPO: ${{ github.repository }}
        run: |
          cd $GITHUB_WORKSPACE

          PLAN=$(cat /tmp/plan.txt)
          CLAUDE_MD=$(cat /tmp/claude_md.txt)

          EXEC_PROMPT="You are a senior developer working on the GitHub repository '${REPO}'.

          ## Project context:
          ### CLAUDE.md:
          ${CLAUDE_MD}

          ## Your approved plan (do NOT re-analyze, just execute):
          ${PLAN}

          ## Execution rules:
          - git commit after EVERY file you change: git add -A && git commit -m \"EX-${ISSUE_NUMBER}| <what changed>\"
          - Prioritize commits over perfection — commit partial progress rather than risk losing work
          - Do NOT push or create a PR (the workflow handles that)
          - Write clean, idiomatic code
          - Add or update tests if applicable
          - If you discover useful project knowledge (conventions, gotchas, structure), append it to CLAUDE.md under a '## Learned' section and commit that too
          - Use TodoWrite/TodoRead to track your sub-tasks so you don't lose state

          ## Done criteria:
          The task is complete when all planned files are changed, committed, and tests pass (if applicable).
          Output a brief summary of what was done when finished."

          claude -p "$EXEC_PROMPT" \
            --max-turns 25 \
            --allowedTools "Edit,MultiEdit,Write,Read,Bash,Grep,Glob,TodoWrite,TodoRead" \
            --output-format json \
            > /tmp/exec-output.json 2>&1

          echo "=== Execute output ==="
          cat /tmp/exec-output.json

          EXEC_COST=$(cat /tmp/exec-output.json | jq -r '.total_cost_usd // 0')
          EXEC_TURNS=$(cat /tmp/exec-output.json | jq -r '.num_turns // 0')
          STOP_REASON=$(cat /tmp/exec-output.json | jq -r '.stop_reason // ""')
          EXEC_SUMMARY=$(cat /tmp/exec-output.json | jq -r '.result // ""')

          echo "EXEC_COST=$EXEC_COST" >> $GITHUB_ENV
          echo "EXEC_TURNS=$EXEC_TURNS" >> $GITHUB_ENV
          echo "STOP_REASON=$STOP_REASON" >> $GITHUB_ENV
          echo "$EXEC_SUMMARY" > /tmp/exec_summary.txt

          echo "Execute used $EXEC_TURNS turns, cost \$$EXEC_COST, stop reason: $STOP_REASON"

      # ── Step 3: Resume if hit turn limit ────────────────────────────────────
      - name: Claude — Resume (if needed)
        if: env.STOP_REASON == 'max_turns' || env.STOP_REASON == 'tool_use'
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: |
          cd $GITHUB_WORKSPACE

          EXEC_SUMMARY=$(cat /tmp/exec_summary.txt)
          CLAUDE_MD=$(cat /tmp/claude_md.txt)
          GIT_LOG=$(cat /tmp/git_log.txt)

          RESUME_PROMPT="You are a senior developer working on the GitHub repository '${REPO}'.

          ## Project context:
          ### CLAUDE.md:
          ${CLAUDE_MD}

          ## Situation:
          You previously worked on issue #${ISSUE_NUMBER} and hit the turn limit.
          Check 'git log --oneline -15' to see what has already been committed.

          ## Previous run summary:
          ${EXEC_SUMMARY}

          ## Instructions:
          - Check git log first to understand what's already done
          - Use TodoWrite to list remaining sub-tasks before starting
          - Continue ONLY what is not yet done
          - git commit after EVERY file change: git add -A && git commit -m \"EX-${ISSUE_NUMBER}| <what changed>\"
          - Do NOT redo work that is already committed
          - Do NOT push or create a PR"

          claude -p "$RESUME_PROMPT" \
            --max-turns 15 \
            --allowedTools "Edit,MultiEdit,Write,Read,Bash,Grep,Glob,TodoWrite,TodoRead" \
            --output-format json \
            > /tmp/resume-output.json 2>&1

          echo "=== Resume output ==="
          cat /tmp/resume-output.json

          RESUME_COST=$(cat /tmp/resume-output.json | jq -r '.total_cost_usd // 0')
          RESUME_TURNS=$(cat /tmp/resume-output.json | jq -r '.num_turns // 0')
          echo "RESUME_COST=$RESUME_COST" >> $GITHUB_ENV
          echo "RESUME_TURNS=$RESUME_TURNS" >> $GITHUB_ENV
          echo "Resume used $RESUME_TURNS turns, cost \$$RESUME_COST"

      # ── Tally total cost ─────────────────────────────────────────────────────
      - name: Calculate total cost
        run: |
          PLAN_COST=${PLAN_COST:-0}
          EXEC_COST=${EXEC_COST:-0}
          RESUME_COST=${RESUME_COST:-0}
          PLAN_TURNS=${PLAN_TURNS:-0}
          EXEC_TURNS=${EXEC_TURNS:-0}
          RESUME_TURNS=${RESUME_TURNS:-0}

          TOTAL_COST=$(awk "BEGIN {printf \"%.7f\", $PLAN_COST + $EXEC_COST + $RESUME_COST}")
          TOTAL_TURNS=$(( ${PLAN_TURNS:-0} + ${EXEC_TURNS:-0} + ${RESUME_TURNS:-0} ))

          echo "CLAUDE_COST=$TOTAL_COST" >> $GITHUB_ENV
          echo "CLAUDE_TURNS=$TOTAL_TURNS" >> $GITHUB_ENV
          echo "Total cost: \$$TOTAL_COST across $TOTAL_TURNS turns"
          echo "PLAN_TURNS=$PLAN_TURNS" >> $GITHUB_ENV
          echo "EXEC_TURNS=$EXEC_TURNS" >> $GITHUB_ENV
          echo "RESUME_TURNS=$RESUME_TURNS" >> $GITHUB_ENV

      # ── Commit any leftover unstaged changes ─────────────────────────────────
      - name: Commit any uncommitted Claude changes
        if: always()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          cd $GITHUB_WORKSPACE
          git add -A
          if git diff --cached --quiet; then
            echo "Nothing to commit"
          else
            git commit -m "fix: Claude leftover changes for issue #${ISSUE_NUMBER}"
          fi

      # ── Push and open PR ─────────────────────────────────────────────────────
      - name: Push branch and open PR
        if: always()
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
        run: |
          cd $GITHUB_WORKSPACE
          BRANCH="claude/fix-issue-${ISSUE_NUMBER}"

          DEFAULT_BRANCH=$(git remote show origin | grep 'HEAD branch' | awk '{print $NF}')
          echo "Default branch: $DEFAULT_BRANCH"

          COMMITS_AHEAD=$(git rev-list --count origin/${DEFAULT_BRANCH}..HEAD 2>/dev/null || echo 0)
          echo "Commits ahead: $COMMITS_AHEAD"

          if [ "$COMMITS_AHEAD" -eq 0 ]; then
            echo "No changes made by Claude."
            gh issue comment "$ISSUE_NUMBER" \
              --body "🤖 Claude analyzed this issue but made no code changes. Check the [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details."
            exit 0
          fi

          git push origin "$BRANCH"

          EXISTING_PR=$(gh pr list --head "$BRANCH" --json number --jq '.[0].number')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #$EXISTING_PR already exists, updating comment."
            gh issue comment "$ISSUE_NUMBER" \
              --body "Claude updated existing PR #$EXISTING_PR with new changes.
  
                      **Cost:** \$${{ env.CLAUDE_COST }} USD (${{ env.CLAUDE_TURNS }} turns total)
                      **Breakdown:** Plan: ${{ env.PLAN_TURNS }} turns | Execute: ${{ env.EXEC_TURNS }} turns | Resume: ${{ env.RESUME_TURNS }} turns"
          else
            gh pr create \
            --title "fix: resolve issue #${ISSUE_NUMBER} - ${ISSUE_TITLE}" \
            --body "## Automated fix for #${ISSUE_NUMBER}
          
            This PR was generated by Claude Code in response to a trigger comment on the issue.
          
            **Cost:** \$${{ env.CLAUDE_COST }} USD (${{ env.CLAUDE_TURNS }} turns total)
            **Breakdown:** Plan: ${{ env.PLAN_TURNS }} turns | Execute: ${{ env.EXEC_TURNS }} turns | Resume: ${{ env.RESUME_TURNS }} turns
          
            **Please review carefully before merging.**
            
            Closes #${ISSUE_NUMBER}" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH"
          fi