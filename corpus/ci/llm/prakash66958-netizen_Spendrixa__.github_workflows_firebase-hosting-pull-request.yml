# This file was auto-generated by Claude Code
# It will deploy a preview of your site to Firebase Hosting on pull requests
name: Deploy to Firebase Hosting on PR
'on': pull_request
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  build_and_preview:
    if: '${{ github.event.pull_request.head.repo.full_name == github.repository }}'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: '${{ secrets.GITHUB_TOKEN }}'
          firebaseServiceAccount: '${{ secrets.FIREBASE_SERVICE_ACCOUNT_EXPENSE_TRACKER_1B22D }}'
          projectId: expense-tracker-1b22d
          channelId: 'pr-${{ github.event.pull_request.number }}'
          entryPoint: .
        env:
          FIREBASE_CLI_PREVIEWS: hostingchannels
