name: Claude Code Fix

on:
  issues:
    types: [labeled]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  fix:
    if: github.event.label.name == 'auto-fix'
    runs-on: macos-15
    timeout-minutes: 30

    env:
      ISSUE_NUMBER: ${{ github.event.issue.number }}
      ISSUE_TITLE: ${{ github.event.issue.title }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci --ignore-scripts && npx electron-rebuild -f -w better-sqlite3 --arch arm64

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GH_TOKEN: ${{ github.token }}
        run: |
          ISSUE_BODY=$(gh issue view "$ISSUE_NUMBER" --json body -q .body)

          claude -p "You are fixing issue #${ISSUE_NUMBER} in an Electron RSS reader app called Antenna.

          Issue title: ${ISSUE_TITLE}

          Issue description:
          ${ISSUE_BODY}

          Instructions:
          - Read the relevant source files to understand the codebase
          - Implement a fix for the issue
          - Make sure your changes are minimal and focused on the issue
          - Do not modify unrelated code
          - Do not update version numbers
          - Run 'npx tsc --noEmit' to verify there are no type errors
          - When done, write a file called .claude-summary.md with this exact format:

          ## Problem
          (1-3 sentences explaining the root cause)

          ## Solution
          (1-3 sentences explaining what you changed and why)

          ## Files changed
          (bulleted list of files modified with a short note on each)" \
            --allowedTools Edit,Write,Bash,Read

      - name: Check for changes
        id: changes
        run: |
          # Exclude non-source files from the commit
          git checkout -- .claude-summary.md 2>/dev/null || true
          git checkout -- .github/ 2>/dev/null || true
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Create pull request
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          BRANCH="auto-fix/issue-${ISSUE_NUMBER}"

          # Read the summary Claude wrote (fall back to generic if missing)
          SUMMARY=""
          if [ -f .claude-summary.md ]; then
            SUMMARY=$(cat .claude-summary.md)
            rm .claude-summary.md
          fi

          # Clean up any previous attempt
          git push origin --delete "$BRANCH" 2>/dev/null || true

          git checkout -b "$BRANCH"
          git add -A
          git commit -m "Fix #${ISSUE_NUMBER}: $(echo "$ISSUE_TITLE" | head -c 60)

          Automated fix by Claude Code.

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin "$BRANCH"

          # Build PR body
          PR_BODY="Closes #${ISSUE_NUMBER}

          ${SUMMARY:-_No summary was generated._}

          ---

          <details>
          <summary>Review checklist</summary>

          - [ ] Changes are focused on the reported issue
          - [ ] No unrelated modifications
          - [ ] Tested locally with \`npm start\`

          </details>

          _Generated by Claude Code via GitHub Actions_"

          gh pr create \
            --title "Fix #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body "$PR_BODY"

      - name: Comment on issue (success)
        if: steps.changes.outputs.has_changes == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          PR_URL=$(gh pr list --head "auto-fix/issue-${ISSUE_NUMBER}" --json url -q '.[0].url')
          gh issue comment "$ISSUE_NUMBER" \
            --body "Claude Code has created a fix: ${PR_URL}"

      - name: Comment on issue (no changes)
        if: steps.changes.outputs.has_changes == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh issue comment "$ISSUE_NUMBER" \
            --body "Claude Code analyzed this issue but could not produce a fix automatically. Manual investigation needed."
