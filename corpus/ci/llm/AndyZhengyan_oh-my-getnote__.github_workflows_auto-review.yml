name: Auto Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Checkout PR branch
        uses: actions/checkout@v4
        with:
          ref: ${ github.event.pull_request.head.ref }
          fetch-depth: 0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Claude Code
        run: npm install -g @anthropic/claude-code

      - name: Run pr-review-toolkit review
        id: review
        run: |
          cd web && claude --print "/pr-review-toolkit:review-pr all" > /tmp/review-output.txt 2>&1 || true
        env:
          CLAUDE_API_KEY: ${ secrets.CLAUDE_API_KEY }

      - name: Post review comment
        if: always()
        run: |
          python3 - << 'PYEOF'
          import subprocess, os

          with open('/tmp/review-output.txt') as f:
              output = f.read()

          lines = output.splitlines()
          preview = '\n'.join(lines[:200])
          truncated = len(lines) > 200

          body = "## Claude Code Auto Review\n\n```\n" + preview + "\n```\n\n"
          if truncated:
              body += "_... (truncated, see full output in CI logs)_\n\n"
          body += "---\n*Auto-generated by Claude Code*"

          pr_num = os.environ['PR_NUMBER']
          repo = os.environ['GITHUB_REPOSITORY']
          subprocess.run(
              ['gh', 'pr', 'comment', pr_num, '--body', body],
              check=True
          )
          PYEOF
        env:
          GH_TOKEN: ${ secrets.GITHUB_TOKEN }
          PR_NUMBER: ${ github.event.pull_request.number }
          GITHUB_REPOSITORY: ${ github.repository }
