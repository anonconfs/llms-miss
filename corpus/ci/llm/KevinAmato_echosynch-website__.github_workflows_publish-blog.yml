name: Weekly Blog Post

on:
  schedule:
    # Every Wednesday at 9:00 AM UTC. Spaced from Thread-Patrol's
    # Monday slot to even out cron load and PR-review attention.
    - cron: '0 9 * * 3'
  workflow_dispatch:
    inputs:
      keyword:
        description: 'Custom keyword (leave blank to use next N from queue). Ignored if count > 1.'
        required: false
        default: ''
      count:
        description: 'How many posts to generate this run (1-5). Use 5 for an initial seed of an empty blog.'
        required: false
        default: '1'

# Auto-merge mode (option B from product spec): the workflow commits
# directly to main and deploys to Cloudflare Pages without opening a
# PR. The blocking quality gates inside scripts/generate-post.cjs are
# the only safety net — if a draft fails, the script regenerates up
# to 2 more times before failing.
#
# Multi-post mode (count > 1): runs the generator N times in
# succession, *soft-failing* on individual post failures (continues
# the loop). At the end of the loop, if at least one post succeeded,
# we commit + deploy in a single batch. Useful for seeding an empty
# blog (e.g. count=5 on first manual run).
permissions:
  contents: write

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
        # No `cache: 'npm'` — requires a package-lock.json the repo
        # doesn't ship. Cold install is ~15s; not worth committing a
        # lockfile just for the cache speedup at this dependency size.

      - name: Install dependencies
        run: npm ci || npm install

      - name: Generate blog post(s)
        id: generate
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          KEYWORD_INPUT: ${{ github.event.inputs.keyword }}
          COUNT_INPUT: ${{ github.event.inputs.count }}
        run: |
          # Default count to 1 (covers the cron path which doesn't supply
          # workflow inputs). Clamp to 1-5 to prevent accidental runaways.
          COUNT="${COUNT_INPUT:-1}"
          if ! [[ "$COUNT" =~ ^[1-5]$ ]]; then
            echo "::error::count must be an integer 1-5; got '$COUNT'"
            exit 1
          fi

          SUCCESS=0
          FAIL=0

          for i in $(seq 1 "$COUNT"); do
            echo "::group::Post $i of $COUNT"
            if [[ "$COUNT" == "1" && -n "$KEYWORD_INPUT" ]]; then
              # Single-post mode with explicit keyword override
              if node scripts/generate-post.cjs "$KEYWORD_INPUT"; then
                SUCCESS=$((SUCCESS + 1))
              else
                FAIL=$((FAIL + 1))
              fi
            else
              # Queue-driven (cron path or seed mode)
              if node scripts/generate-post.cjs; then
                SUCCESS=$((SUCCESS + 1))
              else
                FAIL=$((FAIL + 1))
                echo "::warning::Post $i failed quality gates after 3 retries — keyword stays unused, continuing."
              fi
            fi
            echo "::endgroup::"
          done

          echo "success=$SUCCESS" >> $GITHUB_OUTPUT
          echo "fail=$FAIL" >> $GITHUB_OUTPUT

          # Hard-fail the workflow only if every attempt failed. If at
          # least one post succeeded, we proceed to commit + deploy.
          if [[ "$SUCCESS" == "0" ]]; then
            echo "::error::All $COUNT posts failed generation. No commit, no deploy."
            exit 1
          fi

      - name: Build site
        run: npx astro build

      - name: Commit + push to main
        run: |
          git config user.name  "echo-synch-bot"
          git config user.email "noreply@echo-synch.com"
          git add src/content/blog/*.md src/data/keyword-queue.json
          # Quote-safe commit message even when generated titles contain
          # backticks or quotes — use a heredoc.
          NEW_FILES=$(git diff --cached --name-only --diff-filter=A | grep '^src/content/blog/' | wc -l)
          git commit -F - <<EOF
          blog: $NEW_FILES auto-generated post(s)

          Auto-generated by Claude Sonnet 4.6 via .github/workflows/publish-blog.yml.
          All committed posts passed the blocking quality gates
          (banned-phrase, em-dash cap, word count, duplicate-title,
          H2 count, required-artifact).
          EOF
          git push origin main

      - name: Deploy to Cloudflare Pages
        # The Cloudflare Pages → GitHub webhook for echosynch-website is
        # known broken — wrangler-direct-upload is the canonical deploy
        # path until that's fixed (see docs/PROJECT_PAPER.md §10.6.1).
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx wrangler pages deploy dist \
            --project-name=echosynch-website \
            --branch=main \
            --commit-dirty=true

      - name: Summary
        if: always()
        run: |
          echo "## 📝 Blog publish run" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Posts succeeded:** ${{ steps.generate.outputs.success }}" >> $GITHUB_STEP_SUMMARY
          echo "**Posts failed:**    ${{ steps.generate.outputs.fail }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Generated by Claude Sonnet 4.6 with blocking quality gates. Live at https://echo-synch.com/blog" >> $GITHUB_STEP_SUMMARY
