name: Claude Code Full Workflow

# トリガー: Issueコメント、PR作成、手動実行
on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Task for Claude Code'
        required: true
        default: 'Implement next feature from backlog'
  issue_comment:
    types: [created]
  pull_request:
    types: [opened, reopened]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

jobs:
  # ========================================
  # Job 1: Claude Codeでコード生成
  # ========================================
  generate-code:
    runs-on: ubuntu-latest
    continue-on-error: true
    # Issueコメントが `/claude` で始まる場合のみ実行
    if: |
      secrets.ANTHROPIC_API_KEY != '' && (
        github.event_name == 'workflow_dispatch' ||
        (github.event_name == 'issue_comment' && startsWith(github.event.comment.body, '/claude'))
      )
    outputs:
      pr_number: ${{ steps.create-pr.outputs.pr_number }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Claude Code environment
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Extract task from comment
        id: extract-task
        if: github.event_name == 'issue_comment'
        run: |
          TASK="${{ github.event.comment.body }}"
          TASK="${TASK#/claude }"
          echo "task=$TASK" >> $GITHUB_OUTPUT

      - name: Run Claude Code
        id: claude-code
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            ${{ github.event_name == 'workflow_dispatch' && inputs.task || steps.extract-task.outputs.task }}

            Instructions:
            - Analyze the current repository structure
            - Implement the requested feature or fix
            - Follow TypeScript/React best practices
            - Write tests if applicable
            - Create clear commit messages

      - name: Create Pull Request
        id: create-pr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            feat: ${{ github.event_name == 'workflow_dispatch' && inputs.task || steps.extract-task.outputs.task }}

            🤖 Generated with Claude Code

            Co-Authored-By: Claude <noreply@anthropic.com>
          branch: claude-code/${{ github.run_number }}
          title: '[Claude Code] ${{ github.event_name == 'workflow_dispatch' && inputs.task || steps.extract-task.outputs.task }}'
          body: |
            ## 🤖 Claude Code Auto-Generated PR

            **Task**: ${{ github.event_name == 'workflow_dispatch' && inputs.task || steps.extract-task.outputs.task }}

            ### Changes
            ${{ steps.claude-code.outputs.summary }}

            ---
            <sub>Generated by Claude Code | Workflow: ${{ github.workflow }} | Run: ${{ github.run_number }}</sub>
          labels: |
            claude-code
            auto-generated
          reviewers: ${{ github.event.comment.user.login || github.actor }}

      - name: Comment on Issue
        if: github.event_name == 'issue_comment' && steps.create-pr.outputs.pull-request-number
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `✅ Claude Code has created PR #${{ steps.create-pr.outputs.pull-request-number }}\n\n[View Pull Request](${{ steps.create-pr.outputs.pull-request-url }})`
            });

  # ========================================
  # Job 2: AIコードレビュー (MCP)
  # ========================================
  ai-code-review:
    needs: generate-code
    runs-on: ubuntu-latest
    if: needs.generate-code.outputs.pr_number
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install

      - name: Run MCP-based AI Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ needs.generate-code.outputs.pr_number }}
        run: node .github/scripts/mcp-review.js

  # ========================================
  # Job 3: PR作成時のレビュー (既存PRに対して)
  # ========================================
  review-existing-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          cd .github/scripts
          npm install

      - name: Run MCP-based AI Review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/mcp-review.js
