name: Claude Issue Resolution
on:
  issues:
    types: [labeled]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to resolve'
        required: true
        
jobs:
  resolve-issue:
    runs-on: ubuntu-latest
    # Only run if the issue has the 'ai-fix' label or manually triggered
    if: (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'ai-fix')) || github.event_name == 'workflow_dispatch'
    permissions:
      contents: write
      issues: write
      pull-requests: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Get issue details
        id: issue
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = context.payload.issue ? context.payload.issue.number : context.payload.inputs.issue_number;
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber
            });
            return { 
              number: issueNumber, 
              title: issue.data.title,
              body: issue.data.body
            }
          result-encoding: string
      
      - name: Create branch for issue
        run: |
          ISSUE_NUM=${{ fromJson(steps.issue.outputs.result).number }}
          BRANCH_NAME="issue-${ISSUE_NUM}-fix"
          git checkout -b $BRANCH_NAME
          git push origin $BRANCH_NAME
      
      - name: Run Claude to fix issue
        uses: anthropics/claude-code-action@beta
        with:
          direct_prompt: |
            You're working on issue #${{ fromJson(steps.issue.outputs.result).number }}: "${{ fromJson(steps.issue.outputs.result).title }}"
            
            Issue description:
            ${{ fromJson(steps.issue.outputs.result).body }}
            
            You're on branch issue-${{ fromJson(steps.issue.outputs.result).number }}-fix. Implement a solution following the guidelines in CLAUDE.md.
            Make needed code changes, commit them, and push to this branch.
          
          allowed_tools: "Bash(git status),Bash(git log),Bash(git diff),Bash(git add .),Bash(git commit -m),Bash(git push origin HEAD),View,GlobTool,GrepTool,BatchTool"
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Create PR
        uses: actions/github-script@v6
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const issueNumber = ${{ fromJson(steps.issue.outputs.result).number }};
            await github.rest.pulls.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Fix issue #${issueNumber}: ${{ fromJson(steps.issue.outputs.result).title }}`,
              body: `This PR resolves #${issueNumber}\n\nAutomatically generated by Claude Code.`,
              head: `issue-${issueNumber}-fix`,
              base: 'main'
            });