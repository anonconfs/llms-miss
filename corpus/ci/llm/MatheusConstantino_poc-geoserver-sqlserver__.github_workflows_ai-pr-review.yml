name: AI PR Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review]
    branches: [master, develop]

# Only run on non-draft PRs and skip dependabot
jobs:
  ai-review:
    name: Claude Code Review
    runs-on: ubuntu-latest
    if: |
      github.event.pull_request.draft == false &&
      github.actor != 'dependabot[bot]'
    permissions:
      pull-requests: write
      contents: read

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Anthropic SDK
        run: npm install @anthropic-ai/sdk zod

      - name: Get PR diff
        id: diff
        run: |
          git fetch origin ${{ github.base_ref }}
          DIFF=$(git diff origin/${{ github.base_ref }}...HEAD -- \
            '*.ts' '*.js' '*.sql' '*.yml' '*.yaml' \
            | head -c 12000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run AI review
        id: review
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          DIFF: ${{ steps.diff.outputs.diff }}
        run: |
          node - <<'SCRIPT'
          const Anthropic = require('@anthropic-ai/sdk');
          const fs = require('fs');

          const client = new Anthropic.Anthropic({ apiKey: process.env.ANTHROPIC_API_KEY });

          const systemPrompt = `You are a Senior Code Reviewer for the poc-geoserver-sqlserver project.
          This is a geospatial engineering portfolio project using SQL Server 2022, PostGIS 3.4, GeoServer 2.25, Node.js 20, and Claude API.

          Review the PR diff for:
          1. SECURITY: SQL injection, prompt injection, hardcoded secrets, input validation
          2. SPATIAL CORRECTNESS: SRID consistency (must be 4326), bbox validity, geometry validation, GeoServer bbox bug workaround
          3. PERFORMANCE: spatial index usage, N+1 queries, unbounded result sets
          4. IDEMPOTENCY: SQL scripts must be safe to run multiple times
          5. CODE QUALITY: TypeScript any types, error handling, conventional commits format
          6. SPEC ALIGNMENT: does implementation match the spec referenced in PR body?

          Be direct and specific. Cite line numbers. Distinguish BLOCKING from NON-BLOCKING issues.
          Keep the total review under 600 words. Use markdown formatting.`;

          const userMessage = `PR Title: ${process.env.PR_TITLE}

          PR Description:
          ${process.env.PR_BODY || '(no description)'}

          Diff (truncated to 12k chars):
          \`\`\`
          ${process.env.DIFF || '(no diff — possibly a docs-only change)'}
          \`\`\`

          Provide a structured review.`;

          async function main() {
            const message = await client.messages.create({
              model: 'claude-sonnet-4-6',
              max_tokens: 1024,
              system: systemPrompt,
              messages: [{ role: 'user', content: userMessage }]
            });

            const review = message.content[0].text;
            fs.writeFileSync('/tmp/review.md', review);
            console.log('Review generated successfully');
          }

          main().catch(err => {
            console.error('AI review failed:', err.message);
            fs.writeFileSync('/tmp/review.md', '> AI review unavailable — check ANTHROPIC_API_KEY secret.');
          });
          SCRIPT

      - name: Post review as PR comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');

            const body = `## AI Code Review\n\n> Generated by Claude (claude-sonnet-4-6) via [ai-pr-review.yml](.github/workflows/ai-pr-review.yml)\n> This is an automated first-pass review. Human review is still required.\n\n${review}\n\n---\n*To re-trigger: close and reopen this PR, or push a new commit.*`;

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
