# Webhook action generated by Claude
name: Notify Discord
on:
  push:
    branches: '*'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - name: Post to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK_URL }}
          COMMITS_JSON: ${{ toJson(github.event.commits) }}
          ACTOR: ${{ github.actor }}
          REPO: ${{ github.repository }}
          BRANCH: ${{ github.ref_name }}
          COMPARE: ${{ github.event.compare }}
        run: |
          COMMIT_LIST=$(jq -rn --argjson data "$COMMITS_JSON" \
            '$data | [.[] | "• `\(.id[:7])` \(.message | split("\n")[0]) — \(.author.name)"] | join("\n")')

          CONTENT=$(printf '**%s** pushed to **%s**\nBranch: `%s`\nCommits:\n%s\nCompare: <%s>' \
            "$ACTOR" "$REPO" "$BRANCH" "$COMMIT_LIST" "$COMPARE")

          PAYLOAD=$(jq -n --arg content "$CONTENT" '{content: $content}')

          curl -sSf -H "Content-Type: application/json" \
            -X POST -d "$PAYLOAD" "$DISCORD_WEBHOOK"
