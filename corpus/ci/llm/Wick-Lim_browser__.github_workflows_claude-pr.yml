name: Claude Auto PR

on:
  workflow_dispatch:
    inputs:
      task:
        description: 'Development task'
        required: true
        default: 'Implement Phase 2: CSS Styling'

jobs:
  claude-dev-pr:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.21'

      - name: Install Claude Code
        run: |
          npm install -g @anthropic-ai/claude-code

      - name: Configure Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          mkdir -p ~/.config/claude
          echo '{"apiKey":"'$ANTHROPIC_API_KEY'"}' > ~/.config/claude/config.json

      - name: Create feature branch
        run: |
          BRANCH_NAME="claude/auto-dev-$(date +%s)"
          echo "BRANCH_NAME=$BRANCH_NAME" >> $GITHUB_ENV
          git checkout -b $BRANCH_NAME

      - name: Run Claude Code
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          claude --print \
            --dangerously-skip-permissions \
            --allowed-tools "Read Write Edit Bash Glob Grep" \
            "${{ github.event.inputs.task }}" > claude-output.txt

          cat claude-output.txt

      - name: Commit changes
        run: |
          git config --global user.name 'Claude Code Bot'
          git config --global user.email 'claude-bot@users.noreply.github.com'

          git add .
          git commit -m "🤖 ${{ github.event.inputs.task }}

Generated by Claude Code

Co-Authored-By: Claude <noreply@anthropic.com>" || echo "No changes to commit"

          git push origin $BRANCH_NAME

      - name: Create Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh pr create \
            --title "🤖 Auto-dev: ${{ github.event.inputs.task }}" \
            --body "$(cat <<'EOF'
## Automated Development by Claude Code

**Task:** ${{ github.event.inputs.task }}

### Changes Made:
$(cat claude-output.txt | head -n 50)

---
🤖 Generated with Claude Code
Please review before merging!
EOF
)"
