name: MiMo Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened]

jobs:
  claude:
    if: |
      github.actor == 'Yong-yuan-X' && (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    timeout-minutes: 60

    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Run Claude Code with MiMo
        uses: anthropics/claude-code-action@v1
        with:
          trigger_phrase: "@claude"
          # Required by the action validator; gateway auth is set with ANTHROPIC_AUTH_TOKEN below.
          anthropic_api_key: ${{ secrets.MIMO_API_KEY }}
          settings: |
            {
              "env": {
                "ANTHROPIC_BASE_URL": "https://token-plan-sgp.xiaomimimo.com/anthropic",
                "ANTHROPIC_AUTH_TOKEN": "${{ secrets.MIMO_API_KEY }}",
                "ANTHROPIC_DEFAULT_SONNET_MODEL": "mimo-v2.5-pro",
                "ANTHROPIC_DEFAULT_OPUS_MODEL": "mimo-v2.5-pro",
                "ANTHROPIC_DEFAULT_HAIKU_MODEL": "mimo-v2.5-pro"
              }
            }
          claude_args: |
            --model mimo-v2.5-pro
            --max-turns 50

      - name: Create PR from Claude branch
        if: success() && (github.event_name == 'issue_comment' || github.event_name == 'issues') && !github.event.issue.pull_request
        env:
          GH_TOKEN: ${{ github.token }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          DEFAULT_BRANCH: ${{ github.event.repository.default_branch }}
        run: |
          BRANCH=$(git ls-remote --heads origin "claude/issue-${ISSUE_NUMBER}-*" \
            | awk '{print $2}' \
            | sed 's#refs/heads/##' \
            | sort \
            | tail -n 1)

          if [ -z "$BRANCH" ]; then
            echo "No Claude branch found for issue #${ISSUE_NUMBER}"
            exit 0
          fi

          EXISTING_PR=$(gh pr list \
            --repo "$GITHUB_REPOSITORY" \
            --head "$BRANCH" \
            --state open \
            --json number \
            --jq '.[0].number // ""')

          if [ -n "$EXISTING_PR" ]; then
            echo "PR #${EXISTING_PR} already exists for ${BRANCH}"
            exit 0
          fi

          CLAUDE_REPORT_FILE="${RUNNER_TEMP}/claude-execution-report.md"

          gh api "repos/${GITHUB_REPOSITORY}/issues/${ISSUE_NUMBER}/comments?per_page=100" \
            --jq '[.[] | select(.user.login == "claude")][-1].body // ""' \
            > "$CLAUDE_REPORT_FILE"

          if [ ! -s "$CLAUDE_REPORT_FILE" ]; then
            echo "Claude execution report was not found in the issue comments." > "$CLAUDE_REPORT_FILE"
          fi

          BODY_FILE="${RUNNER_TEMP}/claude-pr-body.md"

          cat > "$BODY_FILE" <<EOF
          ## Summary

          Implements #${ISSUE_NUMBER}: ${ISSUE_TITLE}

          This PR was generated by Claude/MiMo based on the linked issue.

          ## Claude Execution Report

          <details>
          <summary>Show Claude's full execution report</summary>

          $(cat "$CLAUDE_REPORT_FILE")

          </details>

          ## Testing

          See Claude's execution report and workflow logs. Please verify locally before merging.

          ## Review Notes

          Please review the diff before merging.

          Closes #${ISSUE_NUMBER}
          EOF

          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base "$DEFAULT_BRANCH" \
            --head "$BRANCH" \
            --title "Implement #${ISSUE_NUMBER}: ${ISSUE_TITLE}" \
            --body-file "$BODY_FILE"