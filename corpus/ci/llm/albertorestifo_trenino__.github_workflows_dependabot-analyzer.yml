name: Dependabot PR Analyzer

on:
  # SECURITY: Uses pull_request_target so Dependabot PRs can access secrets.
  # Safety measures against "pwn request" attacks:
  #   1. Checkout explicitly targets the default branch (not PR head)
  #   2. Only triggers for dependabot[bot] (if condition + allowed_bots)
  #   3. No untrusted PR data (title/body) interpolated into shell commands
  #   4. Minimal permissions (read contents, write PRs)
  pull_request_target:
    types: [opened]

jobs:
  analyze-dependabot:
    if: github.actor == 'dependabot[bot]'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      pull-requests: write
      issues: read

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          # SECURITY: Explicitly checkout the base branch, NOT the PR head.
          # With pull_request_target, secrets are available. Checking out
          # untrusted PR code would allow secret exfiltration.
          ref: ${{ github.event.repository.default_branch }}
          fetch-depth: 1

      - name: Analyze with Claude
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed_bots: "dependabot[bot]"
          prompt: |
            Analyze Dependabot PR #${{ github.event.pull_request.number }} and post a safety assessment comment.

            ## Instructions

            1. **Get PR details** using `gh pr view ${{ github.event.pull_request.number }} --json title,body,files`

            2. **Parse the PR title** to extract:
               - Package name
               - Old version and new version
               - Update type (major/minor/patch)
               - Ecosystem (from branch name or file paths: mix.lock = Elixir, Cargo.lock = Rust, etc.)

            3. **Search for package usage** in the codebase:
               - For Elixir packages: search for the module name in lib/ (e.g., `circuits_uart` → search for `Circuits.UART`)
               - For Rust packages: search for `use <package>` or `<package>::` in tauri/src-tauri/
               - For GitHub Actions: search in .github/workflows/

            4. **Fetch the changelog** if available in the PR body (look for [Release notes] or [Changelog] links)

            5. **Assess risk level**:
               - 🔴 High Risk: Major version bump OR breaking changes detected in changelog
               - 🟡 Medium Risk: Minor version bump with new features, or widely-used package
               - 🟢 Low Risk: Patch version with only bug fixes, or dev-only dependency

            6. **Post a comment** on the PR using this format:

            ```
            ## 🤖 Dependabot PR Analysis

            **Package:** <package> (<ecosystem>)
            **Update:** v<old> → v<new> (<type>)
            **Risk Level:** <emoji> <level>

            ### Assessment
            <✅ Safe to merge / ⚠️ Needs review / 🚨 Breaking changes detected>

            ### Changelog Summary
            - <key changes from changelog, or "No changelog available">

            ### Impact on Codebase
            - Found <N> usage locations in <paths>
            - <analysis of whether any breaking changes affect the usage>

            ### Recommendations
            - [ ] <specific action items if any>

            ---
            🤖 Generated by Claude Code
            ```

            Use `gh pr comment ${{ github.event.pull_request.number }} --body "..."` to post the comment.
            Use a heredoc for the comment body to handle special characters properly.

      - name: Post fallback comment on failure
        if: failure()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh pr comment ${{ github.event.pull_request.number }} --body "## ⚠️ Dependabot PR Analysis - Failed

          Automated analysis could not be completed. Please review this update manually.

          [View workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

          ---
          🤖 Dependabot PR Analyzer"
