name: Auto-update Documentation on Push

on:
  push:
    branches: [main]

jobs:
  update-docs:
    if: "!contains(github.event.head_commit.message, '[skip-docs]')"
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PROJECT_TOKEN }}

      - name: Get diff details
        id: diff
        run: |
          CHANGED=$(git diff --name-status ${{ github.event.before }} ${{ github.sha }} 2>/dev/null || echo "initial commit")
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          FULL_DIFF=$(git diff ${{ github.event.before }} ${{ github.sha }} -- ':!package-lock.json' ':!*.sql' ':!pnpm-lock.yaml' 2>/dev/null | head -3000)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$FULL_DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

          DOCS=$(find . -name '*.md' -not -path '*/node_modules/*' -not -path '*/.next/*' -not -path '*/dist/*' -not -path '*/.git/*' | sort)
          echo "docs<<EOF" >> $GITHUB_OUTPUT
          echo "$DOCS" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Code to review and update docs
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
        run: |
          claude --print --dangerously-skip-permissions --allowedTools Read,Write,Edit,Glob,Grep,Bash <<'PROMPT'
          A push to main just happened. Your job is to check if any existing documentation files in the repo need updating based on the code changes.

          ## Changed files
          ```
          ${{ steps.diff.outputs.files }}
          ```

          ## Code diff (truncated)
          ```diff
          ${{ steps.diff.outputs.diff }}
          ```

          ## Existing documentation files in the repo
          ```
          ${{ steps.diff.outputs.docs }}
          ```

          ## Your task
          1. Look at the changed files and the diff to understand WHAT changed in this push.
          2. Read each documentation file that could potentially be affected by these changes.
          3. For each doc file, determine if the changes make any part of the documentation outdated, incomplete, or incorrect.
          4. If a doc file needs updating, update it to reflect the new state of the code.
          5. If no docs need updating, do nothing — that's perfectly fine.

          ## Rules
          - ONLY update docs that are actually affected by the changes. Do NOT touch docs that are still accurate.
          - Common things to check: new/removed/renamed modules, changed API routes, new env variables, updated database schema, changed commands, new packages, modified architecture patterns.
          - Keep the same style and language (Spanish for content, English for code identifiers) as the existing docs.
          - Do NOT create new documentation files. Only update existing ones.
          - Do NOT add changelog entries or "last updated" timestamps.
          - Do NOT commit — the workflow handles that.
          - Be conservative: if you're unsure whether a doc needs updating, leave it alone.
          PROMPT

      - name: Commit and push documentation updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add '*.md' '**/*.md'
          if git diff --cached --quiet; then
            echo "No documentation updates needed."
          else
            git commit -m "$(cat <<'EOF'
          docs: auto-update documentation [skip-docs]

          Auto-generated by Claude Code based on changes from:
          ${{ github.event.head_commit.message }}
          EOF
          )"
            git push
          fi
