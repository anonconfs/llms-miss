name: Claude Auto-Fix CI Failures

on:
  workflow_run:
    workflows: ["CI/CD"]
    types: [completed]
    branches: [shahmir]

concurrency:
  group: claude-auto-fix-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  auto-fix:
    name: Auto-Fix with Claude
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'failure' }}
    timeout-minutes: 30
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_branch }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Run Claude Code Auto-Fix
        id: claude-fix
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          max_turns: 10
          prompt: |
            The CI workflow failed on the shahmir branch. Your job is to fix it.

            RULES:
            - Read CLAUDE.md first for all project constraints
            - This project uses JavaScript ONLY — NEVER create .ts files (except tests)
            - Do NOT modify the Dockerfile or docker-compose files
            - Do NOT modify any files in .github/workflows/
            - Do NOT change package.json dependencies or versions
            - Do NOT push to the main branch

            WORKFLOW:
            1. Run `npx prisma generate` first (Prisma client may not be generated)
            2. Run `npm run lint` — fix any ESLint errors
            3. Run `npm test` — fix any failing tests
            4. Run `NEXTAUTH_SECRET=dummy DATABASE_URL=postgresql://ci:ci@localhost:5432/ci npm run build` — fix any build errors
            5. After fixing, re-run the failing command to verify the fix works
            6. Commit your fixes with a clear message

            ESCALATION:
            If you cannot fix the issue after several attempts:
            - STOP trying — do NOT keep retrying the same failed approach
            - Do NOT make speculative changes hoping they might work
            - Leave the code as-is and exit
            - The workflow will automatically create a GitHub Issue for human review

            IMPORTANT: Prefer minimal, targeted fixes. Fix only what is broken.
        continue-on-error: true

      - name: Check if fixes were made
        id: check-fixes
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Verify fixes pass CI
        id: verify
        if: steps.check-fixes.outputs.has_changes == 'true'
        run: |
          npx prisma generate
          npm run lint
          npm test
          NEXTAUTH_SECRET=dummy DATABASE_URL='postgresql://ci:ci@localhost:5432/ci?schema=public' npm run build
        env:
          NODE_OPTIONS: '--max-old-space-size=4096'
        continue-on-error: true

      - name: Create PR with fixes
        if: steps.check-fixes.outputs.has_changes == 'true' && steps.verify.outcome == 'success'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="claude-fix/$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "$(cat <<'EOF'
          fix: auto-fix CI failures (Claude)

          Automated fix for CI failures on the shahmir branch.
          All tests, lint, and build verified passing.

          Co-Authored-By: Claude <noreply@anthropic.com>
          EOF
          )"
          git push origin "$BRANCH"
          gh pr create \
            --base shahmir \
            --head "$BRANCH" \
            --title "fix: auto-fix CI failures" \
            --body "$(cat <<'EOF'
          ## Summary
          Automated fix for CI failures on the `shahmir` branch.

          - All tests passing
          - Lint clean
          - Build successful

          ## Review
          Please review the changes before merging.

          🤖 Generated by Claude Code Auto-Fix
          EOF
          )"

      - name: Create issue if fix failed
        if: steps.check-fixes.outputs.has_changes == 'false' || steps.verify.outcome == 'failure'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue create \
            --title "CI Failure: Auto-fix could not resolve ($(date +%Y-%m-%d))" \
            --body "$(cat <<'EOF'
          ## CI Failure — Manual Fix Required

          The Claude auto-fix workflow was unable to resolve the CI failure on the `shahmir` branch.

          **Failed workflow run:** ${{ github.event.workflow_run.html_url }}
          **Branch:** shahmir

          ### Next Steps
          1. Check the [failed CI run](${{ github.event.workflow_run.html_url }}) for error details
          2. Fix the issue manually
          3. Push the fix to `shahmir`

          🤖 Created by Claude Code Auto-Fix
          EOF
          )" \
            --label "bug"
