name: Daily Suggestion

on:
  schedule:
    # Every day at 5:00 UTC (6:00 or 7:00 CET/CEST)
    - cron: '0 5 * * *'
  workflow_dispatch:
    inputs:
      category:
        description: 'Category to suggest (tool, method, framework, case-study, resource). Leave empty for daily rotation.'
        required: false
        default: ''

jobs:
  suggest:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate suggestion and entry files
        id: suggest
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CATEGORY_OVERRIDE: ${{ github.event.inputs.category || '' }}
        run: python scripts/daily_suggest.py

      - name: Create branch and PR
        if: steps.suggest.outputs.entry_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENTRY_ID: ${{ steps.suggest.outputs.entry_id }}
          ENTRY_TYPE: ${{ steps.suggest.outputs.entry_type }}
          ENTRY_TITLE: ${{ steps.suggest.outputs.entry_title }}
        run: |
          BRANCH="ai-suggest/${ENTRY_TYPE}/${ENTRY_ID}"
          git config user.name "collabatlas-bot"
          git config user.email "bot@collabatlas.org"
          git checkout -b "$BRANCH"
          git add data/entries/ content/catalogue/
          git commit -m "Add ${ENTRY_TYPE}: ${ENTRY_TITLE}

          AI-suggested entry by the daily discovery bot (Claude Sonnet)."
          git push --force-with-lease origin "$BRANCH"

          PR_URL=$(gh pr create \
            --title "AI Suggestion: Add ${ENTRY_TYPE} — ${ENTRY_TITLE}" \
            --body "$(cat <<'PREOF'
          ## AI-Suggested Entry

          This entry was automatically suggested by the CollabAtlas daily discovery bot (Claude Sonnet).

          ### Review checklist
          - [ ] Entry content is accurate and relevant
          - [ ] Taxonomy values are appropriate
          - [ ] Description is clear and well-written
          - [ ] Website URL is valid
          - [ ] CI validation passes

          *Merge if the entry looks good, or close if not relevant.*
          PREOF
          )" \
            --label "ai-suggestion,review-needed" \
            --base main)

          echo "pr_url=${PR_URL}" >> "$GITHUB_OUTPUT"

      - name: Create tracking issue
        if: steps.suggest.outputs.entry_id != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ENTRY_TITLE: ${{ steps.suggest.outputs.entry_title }}
          ENTRY_TYPE: ${{ steps.suggest.outputs.entry_type }}
        run: |
          # Read suggestion data
          SUGGESTION=$(cat suggestion.json)
          DESCRIPTION=$(echo "$SUGGESTION" | python -c "import sys,json; d=json.load(sys.stdin); print(d['suggestion'].get('description',''))")
          JUSTIFICATION=$(echo "$SUGGESTION" | python -c "import sys,json; d=json.load(sys.stdin); print(d['suggestion'].get('justification',''))")

          gh issue create \
            --title "[AI Suggestion] ${ENTRY_TYPE}: ${ENTRY_TITLE}" \
            --body "## AI Suggestion: ${ENTRY_TITLE}

          ${DESCRIPTION}

          ### Why add this?
          ${JUSTIFICATION}

          ---
          A pull request has been created automatically. Review and merge if appropriate.

          *Generated by Claude Sonnet.*" \
            --label "ai-suggestion,triage"
