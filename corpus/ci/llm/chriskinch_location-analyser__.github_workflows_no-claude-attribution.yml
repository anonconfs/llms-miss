name: No Claude Attribution

on:
  # pull_request_target sources this workflow from the base branch, so a PR
  # cannot disable the check by editing the workflow in its own head branch.
  # Safe here: no PR code is checked out and permissions are read-only.
  pull_request_target:
    types: [opened, edited, reopened, synchronize]
  issue_comment:
    types: [created, edited]
  pull_request_review:
    types: [submitted, edited]
  pull_request_review_comment:
    types: [created, edited]

permissions:
  contents: read
  pull-requests: read
  issues: read

jobs:
  check:
    # issue_comment fires for issues too; only run on PR comments.
    if: ${{ github.event_name != 'issue_comment' || github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Check for forbidden Claude attribution
        uses: actions/github-script@v7
        with:
          script: |
            // The PR title may mention Claude freely. The PR body and any
            // comment/review may mention Claude too, but must NOT contain the
            // auto-generated "Generated by Claude Code" attribution. The source
            // branch must not start with "claude/".
            const phrase = /generated by claude code/i;
            const offenders = [];

            const check = (label, text) => {
              if (text && phrase.test(text)) {
                offenders.push(label);
              }
            };

            // Resolve the PR number across the different trigger event shapes.
            const prNumber =
              context.payload.pull_request?.number ??
              context.payload.issue?.number;

            if (!prNumber) {
              core.info('No pull request associated with this event; skipping.');
              return;
            }

            // Re-scan the full PR every run so an offending body or comment is
            // still caught on later events and nothing slips through.
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: prNumber,
            });
            check('PR body', pr.data.body);

            // Fail if the source branch name starts with "claude/".
            const branch = pr.data.head.ref;
            if (/^claude\//i.test(branch)) {
              offenders.push(`branch name "${branch}"`);
            }

            const issueComments = await github.paginate(
              github.rest.issues.listComments,
              { owner: context.repo.owner, repo: context.repo.repo, issue_number: prNumber }
            );
            for (const c of issueComments) check(`PR comment #${c.id}`, c.body);

            const reviewComments = await github.paginate(
              github.rest.pulls.listReviewComments,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber }
            );
            for (const c of reviewComments) check(`PR review comment #${c.id}`, c.body);

            const reviews = await github.paginate(
              github.rest.pulls.listReviews,
              { owner: context.repo.owner, repo: context.repo.repo, pull_number: prNumber }
            );
            for (const r of reviews) check(`PR review #${r.id}`, r.body);

            if (offenders.length > 0) {
              const unique = [...new Set(offenders)];
              core.setFailed(
                `Found forbidden content in: ${unique.join(', ')}. ` +
                `Remove any "Generated by Claude Code" attribution, and ` +
                `rename the branch if it starts with "claude/".`
              );
            } else {
              core.info('No forbidden Claude attribution found.');
            }
