name: Scheduled Container Vulnerability Scan

on:
  schedule:
    # Daily scan of main branch mega image at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    inputs:
      test_cve_id:
        description: 'Optional: bypass new-CVE detection and force-analyze this specific CVE ID (for testing the Claude pipeline)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Run Claude analysis but do NOT file GitHub issues (artifact still uploaded)'
        required: false
        type: boolean
        default: false
      skip_fix_pr:
        description: 'Skip the downstream auto-fix PR job (useful for isolating scan/triage testing)'
        required: false
        type: boolean
        default: false
      force_fix_pr:
        description: 'Force the auto-fix PR job to run against all currently-open cve issues, even if this scan found no NEW CVEs (recovery path when a prior fix-PR run failed)'
        required: false
        type: boolean
        default: false

permissions: {}

env:
  GHCR_REPO: ghcr.io/broadinstitute/viral-ngs

jobs:
  scan:
    runs-on: ubuntu-latest
    outputs:
      # Exposed so the downstream cve-fix-pr job can gate on them.
      cve_ids:   ${{ steps.triage.outputs.cve_ids }}
      test_mode: ${{ steps.triage.outputs.test_mode }}
    permissions:
      contents: read
      packages: read
      security-events: write
      issues: write     # for filing CVE issues
      id-token: write   # for OIDC token to GCP via WIF
    steps:
      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history so the Claude analysis step can `git log --grep` and `git show`
          # precedent CVE-fix commits (e.g., to mirror past mitigation patterns exactly).
          fetch-depth: 0

      - name: Free up disk space
        uses: ./.github/actions/free-disk-space

      - name: Log in to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Run Trivy vulnerability scanner
        # Pinned to commit SHA, NOT a floating tag, because aquasecurity/trivy-action
        # was compromised in March 2026 (all version tags force-pushed to malicious
        # commits). This SHA is the vetted v0.36.0 release per broadinstitute/py3-bio#12;
        # do NOT blindly bump to whatever the upstream v0.36.0 tag currently points to —
        # the tag has been moved since. Verify any new SHA against multiple sources.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0
        with:
          image-ref: '${{ env.GHCR_REPO }}:main-mega-amd64'
          format: 'sarif'
          output: 'trivy-results.sarif'
          severity: 'CRITICAL,HIGH'
          limit-severities-for-sarif: true
          exit-code: '0'
          ignore-unfixed: true
          trivyignores: '.trivyignore'
          ignore-policy: '.trivy-ignore-policy.rego'
          scanners: 'vuln'  # vuln only - secret scanning handled by docker.yml scan-secrets job
          timeout: '20m0s'  # Increase timeout for large images

      - name: Run Trivy vulnerability scanner (JSON)
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25  # v0.36.0 — see note above
        with:
          image-ref: '${{ env.GHCR_REPO }}:main-mega-amd64'
          format: 'json'
          output: 'trivy-results.json'
          severity: 'CRITICAL,HIGH,MEDIUM'  # Include MEDIUM for debugging context
          exit-code: '0'   # don't fail here — Claude pipeline + final-step gate handles signaling
          ignore-unfixed: false  # Include non-fixable CVEs for comprehensive debugging/analysis
          trivyignores: '.trivyignore'
          ignore-policy: '.trivy-ignore-policy.rego'
          scanners: 'vuln'  # vuln only - secret scanning handled by docker.yml scan-secrets job
          timeout: '20m0s'  # Increase timeout for large images

      - name: Log scan result count
        if: always()
        run: |
          if [ -f trivy-results.sarif ]; then
            COUNT=$(jq '[.runs[].results[]] | length' trivy-results.sarif)
            echo "::notice::Trivy found $COUNT findings for mega-scheduled (after policy filtering)"
          fi

      - name: Upload Trivy scan results to GitHub Security tab
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: 'trivy-results.sarif'
          category: 'container-mega-scheduled'

      - name: Upload Trivy JSON results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: trivy-mega-scheduled
          path: trivy-results.json

      # === Claude triage pipeline ===
      # If new fixable HIGH/CRITICAL CVEs are found, hand them to Claude (Sonnet 4.6
      # on Vertex AI) for analysis, then file GitHub issues. Source of truth for
      # "new" is GH issues themselves: a CVE is new if no existing issue (open OR
      # closed) has the CVE ID in its title.

      - name: Identify new fixable CVEs
        id: triage
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Use github.event.inputs (not inputs) so this is well-defined on schedule too.
          TEST_CVE_ID: ${{ github.event.inputs.test_cve_id || '' }}
        run: |
          set -euo pipefail

          # Test mode: bypass scan-diff and use the provided CVE ID directly.
          if [ -n "${TEST_CVE_ID:-}" ]; then
            echo "::notice::Test mode active — analyzing TEST_CVE_ID=$TEST_CVE_ID"
            echo "cve_ids=$TEST_CVE_ID" >> "$GITHUB_OUTPUT"
            echo "test_mode=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Production mode: parse trivy JSON for fixable HIGH/CRITICAL CVEs.
          # Note: trivy-results.json contains all CRITICAL/HIGH/MEDIUM (fixable + non-fixable)
          # for comprehensive debugging, but we only auto-triage fixable HIGH/CRITICAL here.
          all_cves=$(jq -r '
            [.Results[]?.Vulnerabilities[]?
              | select((.Severity == "HIGH" or .Severity == "CRITICAL")
                       and (.FixedVersion // "") != "")
              | .VulnerabilityID]
            | unique[]
          ' trivy-results.json)

          if [ -z "$all_cves" ]; then
            echo "::notice::No fixable HIGH/CRITICAL CVEs in scan."
            echo "cve_ids=" >> "$GITHUB_OUTPUT"
            echo "test_mode=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Dedup against existing GH issues (open + closed) by title-substring search.
          # gh search issues --state only accepts "open" or "closed" (not "all"),
          # so we query each state separately and sum the counts.
          new_cves=()
          for cve in $all_cves; do
            open=$(gh search issues \
              --repo "$GITHUB_REPOSITORY" \
              --state open \
              "\"$cve\" in:title" \
              --json url --jq 'length')
            closed=$(gh search issues \
              --repo "$GITHUB_REPOSITORY" \
              --state closed \
              "\"$cve\" in:title" \
              --json url --jq 'length')
            count=$((open + closed))
            if [ "$count" = "0" ]; then
              new_cves+=("$cve")
              echo "  NEW: $cve"
            else
              echo "  existing issue for $cve, skipping"
            fi
          done

          new_list="${new_cves[*]:-}"
          echo "::notice::Found ${#new_cves[@]} new fixable CVE(s)"
          echo "cve_ids=$new_list" >> "$GITHUB_OUTPUT"
          echo "test_mode=false" >> "$GITHUB_OUTPUT"

      - name: Authenticate to GCP via Workload Identity Federation
        if: steps.triage.outputs.cve_ids != ''
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIP_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Ensure issue labels exist
        if: steps.triage.outputs.cve_ids != '' && (github.event.inputs.dry_run || 'false') != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Idempotent: gh label create exits non-zero if label exists; ignore that.
          gh label create security    --color B60205 --description "Security-related issue"            --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh label create cve         --color B60205 --description "CVE tracked in container scans"    --repo "$GITHUB_REPOSITORY" 2>/dev/null || true
          gh label create test        --color FBCA04 --description "Test issue (filed by workflow_dispatch test_cve_id)" --repo "$GITHUB_REPOSITORY" 2>/dev/null || true

      - name: Claude analysis on Vertex AI
        if: steps.triage.outputs.cve_ids != ''
        # Pinned to commit SHA (== v1 as of 2026-04-27) for supply-chain safety;
        # bump this SHA when picking up new claude-code-action releases.
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434  # v1
        env:
          CLAUDE_CODE_USE_VERTEX: '1'
          CLOUD_ML_REGION: global
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        with:
          use_vertex: 'true'
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 30'
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Write",
                  "Bash(mkdir:*)",
                  "Bash(git log:*)",
                  "Bash(git show:*)",
                  "Bash(git rev-parse:*)",
                  "Bash(git grep:*)",
                  "Bash(grep:*)",
                  "Bash(find:*)",
                  "Bash(jq:*)",
                  "Bash(ls:*)",
                  "Bash(cat:*)",
                  "Bash(head:*)",
                  "Bash(tail:*)",
                  "Bash(echo:*)",
                  "Bash(wc:*)",
                  "Bash(sed:*)",
                  "Bash(diff:*)",
                  "Bash(sort:*)"
                ]
              }
            }
          prompt: |
            You are triaging container vulnerabilities for the broadinstitute/viral-ngs repo.

            ## Your task

            For each CVE ID listed below, write a triage report to `.claude-issues/<CVE-ID>.md`.
            The reports will be filed verbatim as GitHub issues by the next workflow step.

            **CVE IDs to analyze:** ${{ steps.triage.outputs.cve_ids }}

            **Test mode:** ${{ steps.triage.outputs.test_mode }}
            (If `true`, the CVE was supplied manually via `test_cve_id` and may not appear in
            the current scan's `trivy-results.json`. Use your training knowledge in that case
            and add a `> _Test analysis_` blockquote at the top of the report so reviewers
            know it was generated for pipeline validation, not from a real scan finding.)

            ## Required reading (do this BEFORE writing reports)

            1. `trivy-results.json` (in the workspace root) — **the authoritative source for
               CVSS score, CVSS vector, package path, fix version, and references.** This
               file contains ALL vulnerabilities (CRITICAL/HIGH/MEDIUM, fixable and non-fixable)
               for comprehensive analysis. Query it with `jq` before writing any report. Example:
               ```
               jq '.Results[]?.Vulnerabilities[]? | select(.VulnerabilityID == "<CVE-ID>")' trivy-results.json
               ```
               You MUST cite the exact CVSS score and vector from this file in the
               "Vulnerability details" section — do NOT infer or estimate them from your
               own knowledge if the CVE is present in the JSON. If the CVE is NOT in the
               JSON (test mode, or scan-target divergence), explicitly say so in the report
               and use your training knowledge as a clearly-labeled fallback.
            2. `.agents/skills/container-vulns/SKILL.md` — read fully. This is the repo's
               container-vulnerability playbook and tells you what the maintainers consider
               actionable vs. accepted risk.
            3. `.trivyignore` — existing per-CVE exceptions with their justifications. Mirror
               the writing style and depth of justification when you recommend `.trivyignore`
               additions.
            4. `.trivy-ignore-policy.rego` — Rego policy for class-level CVE filtering.
               Understand what it filters and why.
            5. `docker/Dockerfile.*` — container build files showing dep installs and inline
               mitigations. Look for prior fixups (`find ... -exec rm`, `gem install`, etc.)
               applied to similar packages.
            6. `docker/requirements/*.txt` — conda dependency lists. Use `grep` to find
               which file pulls in the affected package.
            7. Recent git history — full history is available (the workflow checks out
               with `fetch-depth: 0`). Use:
                 - `git log --all --oneline --grep <package>` to find prior commits
                   touching the affected package
                 - `git log --all --oneline --grep CVE-` to find prior CVE-fix commits
                 - **`git show <sha>` to inspect the FULL DIFF of any precedent fix you
                   plan to cite. Read the diff, not just the commit message.** Many fixes
                   combine multiple elements (e.g., file removal + reinstall) — your
                   recommendation must mirror ALL elements of the precedent, not just the
                   headline change.
                 - ALWAYS verify a commit SHA exists with `git show <sha>` before citing it
                   in the report.

            ## Required structure for each report

            File path: `.claude-issues/<CVE-ID>.md` (filename MUST match the CVE ID exactly).
            **First line MUST be a single H1 used as the issue title:**
            `# [CVE-YYYY-NNNN] <package>: <one-line description>`

            Then sections (use H2 `##` headers):

            1. **Summary** — 2–3 sentences: what it is, severity, where it came from.
            2. **Vulnerability details** — CVSS score + vector + plain-English meaning;
               2–4 sentences explaining the bug technically.
            3. **Dependency chain** — name the direct conda package or Docker layer that
               pulls this in. Trace transitive deps where you can. If you can't determine
               this confidently, say so explicitly — do NOT guess.
            4. **Why the Rego policy didn't suppress it** — explain in terms of the AV/PR/UI/S
               vector classes the policy filters and why this CVE's vector doesn't match.
            5. **Recommended fix** — concrete and actionable. Options:
                - Version bump (which file, which floor)
                - Inline Dockerfile mitigation (which Dockerfile, what RUN-block addition)
                - `.trivyignore` entry (with justification matching the existing style)
               Cite historical precedent when applicable: `(mirror the fix in commit <sha>)`.
            6. **Practical exploitability** — in this deployment model (ephemeral batch
               containers, no network-facing services, no untrusted user input at runtime),
               is this actually reachable? Be honest and specific.
            7. **References** — GHSA URL, NVD URL, vendor advisory.
            8. **Attribution footer** — at the very end of the report, add a horizontal
               rule (`---`) on its own line, then this exact paragraph (italicized):

               `*This analysis and report were authored entirely by Claude Sonnet 4.6 (running on Google Vertex AI via the `container-scan.yml` triage pipeline). Independently verify the CVSS data, dependency chain, recommended fix, and commit SHAs before acting on this report.*`

            ## Constraints

            - `mkdir -p .claude-issues` first.
            - One file per CVE.
            - Be concise. Each report should be readable in 1–2 minutes (target: 300–600 words).
            - Do NOT hallucinate package versions, file paths, or commit SHAs. Verify with
              tools when in doubt.
            - If you finish all reports with budget remaining, do NOT pad — stop.

      - name: File GitHub issues
        if: steps.triage.outputs.cve_ids != '' && (github.event.inputs.dry_run || 'false') != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TEST_MODE: ${{ steps.triage.outputs.test_mode }}
        run: |
          set -uo pipefail
          shopt -s nullglob

          if [ ! -d .claude-issues ]; then
            echo "::error::.claude-issues does not exist — Claude analysis step likely failed"
            exit 1
          fi

          md_files=(.claude-issues/*.md)
          if [ ${#md_files[@]} -eq 0 ]; then
            echo "::error::No .md analysis files in .claude-issues — Claude may have failed silently"
            exit 1
          fi

          failed=0
          for f in "${md_files[@]}"; do
            cve=$(basename "$f" .md)
            title=$(head -1 "$f" | sed 's/^# *//')
            body=$(tail -n +2 "$f")

            # Dedup-integrity guard: title MUST contain the CVE ID, otherwise the next
            # scheduled run won't recognize it as already-triaged via title-substring search.
            if ! echo "$title" | grep -qF "$cve"; then
              echo "::error::Issue title for $cve does not contain the CVE ID — refusing to file (would break dedup)"
              echo "  Title was: $title"
              failed=$((failed+1))
              continue
            fi

            label_args=(--label security --label cve)
            if [ "$TEST_MODE" = "true" ]; then
              label_args+=(--label test)
            fi

            echo "Creating issue for $cve: $title"
            if ! gh issue create \
                --repo "$GITHUB_REPOSITORY" \
                --title "$title" \
                --body "$body" \
                "${label_args[@]}"; then
              echo "::error::Failed to create issue for $cve"
              failed=$((failed+1))
            fi
          done

          if [ $failed -gt 0 ]; then
            echo "::error::$failed issue(s) failed to create"
            exit 1
          fi

      - name: Upload Claude analysis as artifact
        if: steps.triage.outputs.cve_ids != '' && always()
        uses: actions/upload-artifact@v6
        with:
          name: claude-cve-analysis
          path: .claude-issues/*.md
          if-no-files-found: warn
          include-hidden-files: true

      - name: Summarize CVE discovery
        # Notice-level only — we do NOT exit 1 here. New CVE discovery is the
        # expected outcome of a useful scan, not a workflow failure: notifications
        # are delivered via the filed GitHub issues (security + cve labels), and
        # PR-time gating is independently enforced by docker.yml's on-build Trivy
        # scan. Reserving red ✕ for real pipeline breakage (Trivy errored, Claude
        # over budget, gh API failure, etc.) keeps the Actions page signal honest.
        if: steps.triage.outputs.cve_ids != ''
        env:
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          if [ "$DRY_RUN" = "true" ]; then
            echo "::notice::Scheduled scan discovered new fixable HIGH/CRITICAL CVE(s) (dry-run; no issues filed): ${{ steps.triage.outputs.cve_ids }}"
          else
            echo "::notice::Scheduled scan filed issues for new fixable HIGH/CRITICAL CVE(s): ${{ steps.triage.outputs.cve_ids }}"
          fi

  # ============================================================================
  # CVE AUTO-FIX PR JOB — downstream of `scan`. When the scan job filed new
  # `cve`-labeled issues, hand the full set of currently-open CVE issues to
  # Claude Sonnet 4.6 (on Vertex AI) and ask it whether *all* of them can be
  # closed by one clean, precedent-mirroring PR. If yes, the workflow opens a
  # ready-for-review PR. If no, it uploads a decision-log artifact and exits
  # cleanly — no churn on the issues.
  #
  # Confidence bar (enforced in the prompt):
  #   - version-floor bumps in docker/requirements/*.txt
  #   - inline Dockerfile mitigations that mirror an exact precedent commit
  #   - .trivyignore entries with justifications that mirror existing entries
  # Anything ambiguous, novel, or partial → skip the entire PR.
  # ============================================================================
  cve-fix-pr:
    needs: scan
    runs-on: ubuntu-latest
    if: |
      (
        needs.scan.outputs.cve_ids != ''
        && needs.scan.outputs.test_mode != 'true'
        && (github.event.inputs.dry_run    || 'false') != 'true'
        && (github.event.inputs.skip_fix_pr || 'false') != 'true'
      )
      || (
        (github.event.inputs.force_fix_pr || 'false') == 'true'
        && needs.scan.outputs.test_mode != 'true'
      )
    permissions:
      contents: write       # push the auto-fix branch
      pull-requests: write  # open the PR
      issues: write         # list open `cve` issues + apply labels via gh pr create
                            # (label application is issue-scoped in the GH API; the
                            #  `cve-fix` and `security` labels themselves are managed
                            #  manually in the repo, NOT created by the workflow)
      id-token: write       # OIDC → GCP WIF for Vertex AI
    steps:
      # Mint a short-lived (1-hour) installation token for a dedicated GitHub
      # App, instead of using the default GITHUB_TOKEN. The reason: PRs/commits
      # created with the default GITHUB_TOKEN do not trigger downstream
      # workflows (a well-known GH limitation), so the on-PR Trivy + Build/Test
      # required-status-checks would never run on the auto-fix PR, blocking the
      # merge under the `default branch protection` ruleset. App-token-authored
      # PRs DO trigger workflows.
      #
      # Required repo secrets (set up once, manually — see PR #1074 description):
      #   AUTOFIX_APP_ID          — numeric App ID
      #   AUTOFIX_APP_PRIVATE_KEY — full .pem contents (BEGIN/END lines included)
      #
      # This step runs BEFORE checkout so the App token can be passed to
      # actions/checkout via `token:`, which persists it in the local git
      # config for the subsequent `git push`. (Without that, git push would
      # silently fall back to the cached default GITHUB_TOKEN, defeating the
      # whole point of using the App.)
      - name: Mint GitHub App installation token
        id: app-token
        uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1  # v3.2.0
        with:
          app-id: ${{ secrets.AUTOFIX_APP_ID }}
          private-key: ${{ secrets.AUTOFIX_APP_PRIVATE_KEY }}

      - name: Resolve App bot user ID for git commit attribution
        id: app-user
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          user_id=$(gh api "/users/${{ steps.app-token.outputs.app-slug }}[bot]" --jq .id)
          echo "user_id=$user_id" >> "$GITHUB_OUTPUT"

      - name: Checkout repository
        uses: actions/checkout@v5
        with:
          # Full history so Claude can `git log --grep` and `git show` precedent
          # CVE-fix commits — required to satisfy the moderate confidence bar
          # (mirror an exact precedent or skip).
          fetch-depth: 0
          # Persist the App token in .git/config so `git push` later in the
          # job authenticates as the App, not the default GITHUB_TOKEN.
          token: ${{ steps.app-token.outputs.token }}

      - name: Configure git author
        run: |
          git config user.name  '${{ steps.app-token.outputs.app-slug }}[bot]'
          git config user.email '${{ steps.app-user.outputs.user_id }}+${{ steps.app-token.outputs.app-slug }}[bot]@users.noreply.github.com'

      - name: Download scan results from upstream job
        uses: actions/download-artifact@v8
        with:
          name: trivy-mega-scheduled
          path: .

      - name: Gather context for Claude (open issues + in-flight fix PRs)
        id: context
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          mkdir -p .cve-fix-context
          gh issue list --repo "$GITHUB_REPOSITORY" \
            --label cve --state open \
            --json number,title,body,labels --limit 100 \
            > .cve-fix-context/open-issues.json
          gh pr list --repo "$GITHUB_REPOSITORY" \
            --label cve-fix --state open \
            --json number,title,headRefName,body --limit 50 \
            > .cve-fix-context/open-fix-prs.json
          issue_count=$(jq 'length' .cve-fix-context/open-issues.json)
          echo "::notice::Found $issue_count open cve-labeled issue(s) to consider"
          echo "issue_count=$issue_count" >> "$GITHUB_OUTPUT"

      - name: Skip if no open cve issues
        if: steps.context.outputs.issue_count == '0'
        run: |
          echo "::notice::No open cve issues — nothing for the auto-fix pipeline to do."

      - name: Authenticate to GCP via Workload Identity Federation
        if: steps.context.outputs.issue_count != '0'
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ vars.GCP_WIP_PROVIDER }}
          service_account: ${{ vars.GCP_SA_EMAIL }}

      - name: Claude analysis on Vertex AI (auto-fix assessment)
        if: steps.context.outputs.issue_count != '0'
        # Pinned to the same commit SHA as the scan job's Claude step. When
        # bumping, bump both call sites together so they stay aligned.
        uses: anthropics/claude-code-action@567fe954a4527e81f132d87d1bdbcc94f7737434  # v1
        env:
          CLAUDE_CODE_USE_VERTEX: '1'
          CLOUD_ML_REGION: global
          ANTHROPIC_VERTEX_PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
        with:
          use_vertex: 'true'
          github_token: ${{ steps.app-token.outputs.token }}
          claude_args: '--model claude-sonnet-4-6 --max-turns 30'
          settings: |
            {
              "permissions": {
                "allow": [
                  "Read",
                  "Write",
                  "Edit",
                  "Bash(mkdir:*)",
                  "Bash(git log:*)",
                  "Bash(git show:*)",
                  "Bash(git rev-parse:*)",
                  "Bash(git grep:*)",
                  "Bash(grep:*)",
                  "Bash(find:*)",
                  "Bash(jq:*)",
                  "Bash(ls:*)",
                  "Bash(cat:*)",
                  "Bash(head:*)",
                  "Bash(tail:*)",
                  "Bash(echo:*)",
                  "Bash(wc:*)",
                  "Bash(sort:*)",
                  "Bash(diff:*)",
                  "Bash(sed:*)"
                ]
              }
            }
          prompt: |
            You are assessing whether all currently-open container-vulnerability
            issues in broadinstitute/viral-ngs can be closed by a single clean PR.

            ## Your task

            Read the inputs, decide PROCEED or SKIP, and write exactly one of:
              - `.claude-fix-pr/PROCEED.md` — the PR body (and make the file edits
                in the working tree). The workflow will commit + push + open the PR.
              - `.claude-fix-pr/SKIPPED.md` — a decision log explaining, per-CVE,
                what fix would be required and why it didn't meet the bar.

            **Do NOT write both files. Do NOT commit, push, or create a PR
            yourself — the workflow handles VCS operations.**

            ## Inputs

            1. `.cve-fix-context/open-issues.json` — every open issue with the
               `cve` label. Each entry has `number`, `title`, `body`, `labels`.
               The `body` contains the original triage report (CVSS, dependency
               chain, recommended fix, etc.).
            2. `.cve-fix-context/open-fix-prs.json` — every open PR with the
               `cve-fix` label (prior auto-fix runs whose PRs haven't merged yet).
            3. `trivy-results.json` — the most recent scan output containing ALL
               vulnerabilities (CRITICAL/HIGH/MEDIUM, fixable and non-fixable). Use `jq`
               to cross-reference CVSS data or confirm a CVE is still flagged.

            ## Required reading

            Before writing any output:

            1. `.agents/skills/container-vulns/SKILL.md` — read fully. This is
               the repo's playbook. The maintainers' definition of "actionable
               vs. accepted risk" lives here.
            2. `.trivyignore` — existing per-CVE exceptions with their
               justifications. Any `.trivyignore` entry you add MUST mirror the
               writing style and depth of justification of existing entries.
            3. `.trivy-ignore-policy.rego` — Rego policy for class-level CVE
               filtering. Don't ever modify this file.
            4. `docker/Dockerfile.*` — container build files. Look for prior
               inline mitigations (`find ... -exec rm`, `gem install`, etc.)
               that may be precedent for new CVEs of similar shape.
            5. `docker/requirements/*.txt` — conda dependency lists.
            6. Recent git history — `fetch-depth: 0` is in effect. Use:
                 - `git log --all --oneline --grep CVE-` for past CVE fixes
                 - `git log --all --oneline --grep <package>` for prior commits
                   touching the affected package
                 - **`git show <sha>` to inspect the FULL DIFF of any precedent
                   fix you plan to mirror. Read the diff, not just the message.**
                   Many real fixes combine multiple elements (file removal +
                   reinstall, etc.) — your fix must mirror ALL elements.
                 - ALWAYS verify a commit SHA exists with `git show <sha>` before
                   citing it.

            ## Confidence bar (MODERATE) — you must PROCEED only if ALL open CVE
            ## issues can be closed by changes that fall into one of these
            ## categories:

            **(a) Version-floor bump in `docker/requirements/*.txt`.** Direct
            edit to a requirements file pinning the affected package to a
            patched minimum. Verify the fix version against `trivy-results.json`
            (the `FixedVersion` field) and ensure the package is available on
            conda-forge (it often lags PyPI — flag this if unsure).

            **(b) Inline Dockerfile mitigation that mirrors an exact precedent
            commit.** You must cite the precedent SHA in your PR body. The
            mitigation pattern (the RUN-block additions) must match the
            precedent pattern; do not invent new mitigation shapes.

            **(c) `.trivyignore` entry whose justification mirrors an existing
            entry's wording and rationale.** Acceptable when (i) the CVE is
            architecturally unreachable in our deployment model and (ii) at
            least one existing `.trivyignore` entry already accepts a CVE for
            the same class of reason. Cite the existing entry as precedent.

            **If ANY open CVE issue requires:**
            - a novel mitigation pattern with no precedent,
            - a `.trivyignore` justification not mirrored by existing entries,
            - an ARM64 solver-conflict workaround,
            - a Java fat-JAR version bump,
            - any judgment call where you're uncertain,

            **→ then SKIP the entire PR.** Partial PRs are not allowed: it is
            all-of-them-cleanly or none. The SKIPPED.md log will tell humans
            exactly what needs their attention.

            ## Dedup against in-flight auto-fix PRs

            `.cve-fix-context/open-fix-prs.json` lists any unmerged auto-fix
            PRs from prior runs. Default behavior:
              - If an existing PR addresses some or all of the current open
                CVE issues → SKIP, and in SKIPPED.md note the PR number(s) and
                that the prior PR is in-flight.
              - Only consider superseding a prior PR if it is clearly stale
                (e.g., references issues that have since been closed/modified)
                AND your proposed fix is materially cleaner. Explain reasoning
                in SKIPPED.md or PROCEED.md as applicable.

            ## PROCEED.md structure (when you decide to open a PR)

            File path: `.claude-fix-pr/PROCEED.md`. Use this exact structure:

            ```
            ## Summary

            <2–3 sentences: what this PR does, how many CVEs it addresses>

            ## Closes

            Closes #<N>
            Closes #<M>
            <one Closes line per addressed issue, exact format as shown>

            ## Per-CVE rationale

            ### [CVE-YYYY-NNNN] (#<issue-number>)
            - **Fix:** <one-line description: e.g. "pin urllib3>=2.7.0 in baseimage.txt">
            - **Precedent:** <commit SHA + one-line description, verified with git show>
            - **Confidence:** <one of: version-bump | dockerfile-precedent | trivyignore-precedent>

            <repeat per CVE>

            ## Files changed

            - `<path>` — <one-line description of the change>
            <repeat per file>

            ---

            *This PR was authored by Claude Sonnet 4.6 (running on Google Vertex
            AI via the `container-scan.yml` auto-fix pipeline). Review every
            file change, every cited commit SHA, and every justification before
            merging. The CI Trivy scan must pass before merge.*
            ```

            Plus: make the actual file edits in the working tree. Do NOT touch
            anything under `.github/workflows/`, `.trivy-ignore-policy.rego`,
            or the agent's own scratch directories (`.claude-fix-pr/`,
            `.cve-fix-context/`).

            ## SKIPPED.md structure (when you decide NOT to open a PR)

            File path: `.claude-fix-pr/SKIPPED.md`. Use this structure:

            ```
            # Auto-fix decision log — <YYYY-MM-DD>

            **Decision:** SKIP. <one-sentence summary of why.>

            ## Per-CVE reasoning

            ### [CVE-YYYY-NNNN] (#<issue-number>)
            - **Fix that would be required:** <description>
            - **Why this didn't meet the bar:** <specific category: e.g. "no
              precedent for inline mitigation of this shape" / "would need
              novel .trivyignore justification" / "ARM64 conflict risk on
              version bump" / "in-flight PR #<N> already addresses this">

            <repeat per CVE>

            ## In-flight PRs considered

            <list of `cve-fix`-labeled open PRs found, with one-line notes on
            whether they were considered a duplicate>

            ---

            *Generated by Claude Sonnet 4.6 via the auto-fix pipeline.*
            ```

            ## Constraints

            - `mkdir -p .claude-fix-pr` first.
            - Write EXACTLY ONE of PROCEED.md / SKIPPED.md (never both, never
              neither).
            - Do NOT run git add / git commit / git push / gh — those tools
              are explicitly NOT in your permission set.
            - Do NOT modify files under `.github/workflows/`,
              `.trivy-ignore-policy.rego`, `.claude-fix-pr/`, or
              `.cve-fix-context/`.
            - Verify every commit SHA you cite with `git show <sha>`.
            - Verify every `FixedVersion` you cite against `trivy-results.json`.
            - When uncertain, choose SKIP. The cost of a skip is a small
              artifact upload; the cost of a bad PR is reviewer trust.
            - If you finish with budget remaining, do NOT pad — stop.

      - name: Validate Claude output and decide next step
        id: decide
        if: steps.context.outputs.issue_count != '0'
        run: |
          set -uo pipefail
          have_proceed=0
          have_skipped=0
          [ -f .claude-fix-pr/PROCEED.md ] && have_proceed=1
          [ -f .claude-fix-pr/SKIPPED.md ] && have_skipped=1
          if [ "$have_proceed" = "1" ] && [ "$have_skipped" = "1" ]; then
            echo "::error::Claude wrote both PROCEED.md and SKIPPED.md — refusing to act on ambiguous output"
            exit 1
          fi
          if [ "$have_proceed" = "0" ] && [ "$have_skipped" = "0" ]; then
            echo "::error::Claude wrote neither PROCEED.md nor SKIPPED.md — analysis step failed silently"
            exit 1
          fi
          if [ "$have_proceed" = "1" ]; then
            echo "decision=proceed" >> "$GITHUB_OUTPUT"
            echo "::notice::Claude recommends opening an auto-fix PR"
          else
            echo "decision=skip" >> "$GITHUB_OUTPUT"
            echo "::notice::Claude recommends skipping; decision log will be uploaded as an artifact"
          fi

      - name: Install gitleaks
        if: steps.decide.outputs.decision == 'proceed'
        uses: gacts/gitleaks@c9a0338361dc45a01aa7ebaaa5330179f3c62873  # v1.3.2
        with:
          # Install the binary onto PATH only; do NOT let the action run its own
          # scan. By default this action scans the entire repo history, which
          # trips on pre-existing historical findings unrelated to the auto-fix
          # diff. We scan just the staged diff ourselves in the next step.
          run: false

      - name: Open auto-fix PR
        if: steps.decide.outputs.decision == 'proceed'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          set -euo pipefail
          branch="cve-fix/$(date -u +%Y-%m-%d)-${GITHUB_RUN_ID}"
          git checkout -b "$branch"
          # Stage everything EXCEPT the downloaded trivy-results.json artifact.
          # .claude-fix-pr/, .cve-fix-context/, and gha-creds-*.json are gitignored,
          # so `git add -A` skips them silently — do NOT name them in :! pathspecs,
          # because `git add` exits 1 ("paths are ignored" advisory) when an exclude
          # pathspec matches a gitignored path, which kills this step under `set -e`.
          # trivy-results.json is NOT gitignored, so it still needs the explicit exclude.
          git add -A -- ':!trivy-results.json'
          # Scan staged diff for secrets before committing (defence-in-depth).
          # gitleaks is installed by the "Install gitleaks" step above (it is NOT
          # pre-installed on GitHub-hosted ubuntu-latest runners).
          git diff --cached | gitleaks detect --pipe --redact --exit-code 1
          if git diff --cached --quiet; then
            echo "::error::PROCEED.md exists but no file changes were staged — Claude declared a fix without making one"
            exit 1
          fi
          git commit -m "Auto-fix: address open CVE issues (run ${GITHUB_RUN_ID})"
          git push -u origin "$branch"
          gh pr create \
            --repo "$GITHUB_REPOSITORY" \
            --base main \
            --head "$branch" \
            --title "Auto-fix: address open CVE issues ($(date -u +%Y-%m-%d))" \
            --body-file .claude-fix-pr/PROCEED.md \
            --label cve-fix --label security

      - name: Upload decision log (skip case)
        if: always() && steps.decide.outputs.decision == 'skip'
        uses: actions/upload-artifact@v6
        with:
          name: cve-fix-decision-log
          path: .claude-fix-pr/SKIPPED.md
          if-no-files-found: warn

      - name: Upload PR body (proceed case, for audit trail)
        if: always() && steps.decide.outputs.decision == 'proceed'
        uses: actions/upload-artifact@v6
        with:
          name: cve-fix-pr-body
          path: .claude-fix-pr/PROCEED.md
          if-no-files-found: warn
