name: Claude Agent

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    # Only run if the issue/comment contains "@claude" and it's NOT a PR
    if: (contains(github.event.issue.body, '@claude') || contains(github.event.comment.body, '@claude')) && github.event.issue.pull_request == null
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude Agent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # 1. Prepare the Rules Variable
          RULES=""
          if [ -f CLAUDE.md ]; then
            echo "Found CLAUDE.md - Injecting rules into context."
            RULES=$(cat CLAUDE.md)
          else
            echo "No CLAUDE.md found. Proceeding with standard defaults."
          fi

          # 2. Construct the Prompt
          # We place RULES at the very top so they act as system instructions
          PROMPT="PROJECT RULES (STRICTLY FOLLOW):\n$RULES\n\n----------------\n\nTASK:\nAct as a senior developer. Fix the issue described in GitHub Issue #${{ github.event.issue.number }}: ${{ github.event.issue.title }}.\n\nCONTEXT:\n${{ github.event.issue.body }}"

          # 3. Run Agent
          # We use the constructed $PROMPT variable inside the -p flag
          claude -p "$PROMPT" --dangerously-skip-permissions

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "fix: automated changes by Claude Agent"
          title: "Fix: Automated resolution for Issue #${{ github.event.issue.number }}"
          body: |
            Automated fixes generated by Claude Code for Issue #${{ github.event.issue.number }}.
            
            **Verification:**
            - [ ] The agent followed the rules in `CLAUDE.md`.
            - [ ] The fix addresses the user's issue.
            
            Triggered by @${{ github.actor }}
          branch: "claude-fix-${{ github.event.issue.number }}"
          base: main