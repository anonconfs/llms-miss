name: Claude Autonomous Operations

on:
  # Nightly audit at 3 AM UTC (10 PM Peru)
  schedule:
    - cron: '0 3 * * *'

  # Auto-fix issues labeled 'claude-auto'
  issues:
    types: [labeled]

  # Auto-resolve Dependabot PRs
  pull_request:
    types: [opened, synchronize]

  # Manual dispatch
  workflow_dispatch:
    inputs:
      task:
        description: 'Task to execute (audit | fix-issues | dependabot | full)'
        required: true
        default: 'full'

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  # Job 1: Auto-fix issues with label 'claude-auto'
  auto-fix-issues:
    name: Auto-Fix Claude Issues
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'issues' && contains(github.event.issue.labels.*.name, 'claude-auto')) ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'fix-issues' || github.event.inputs.task == 'full'))
    timeout-minutes: 30

    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ci_db"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "ci-placeholder"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Install Claude Code
        run: npm install -g @anthropic-ai/claude-code

      - name: Run Claude auto-fix
        if: github.event_name == 'issues'
        run: |
          ISSUE_TITLE="${{ github.event.issue.title }}"
          ISSUE_BODY="${{ github.event.issue.body }}"
          claude -p "Fix this issue. Title: $ISSUE_TITLE. Description: $ISSUE_BODY. Run lint, typecheck, and tests after fixing. Create a commit with conventional commits format." --allowedTools "Bash,Read,Write,Edit,Glob,Grep" --max-turns 20
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Create PR with fix
        if: success() && github.event_name == 'issues'
        run: |
          BRANCH="claude-auto-fix/issue-${{ github.event.issue.number }}"
          git checkout -b "$BRANCH"
          git add -A
          git diff --cached --quiet && echo "No changes" && exit 0
          git commit -m "fix: auto-resolve #${{ github.event.issue.number }}

          Co-Authored-By: Claude <noreply@anthropic.com>"
          git push origin "$BRANCH"
          gh pr create --title "fix: auto-resolve #${{ github.event.issue.number }}" --body "Automated fix for #${{ github.event.issue.number }} by Claude Code autonomous workflow." --base master
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 2: Auto-resolve Dependabot PRs
  auto-resolve-dependabot:
    name: Auto-Resolve Dependabot
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'pull_request' && github.event.pull_request.user.login == 'dependabot[bot]') ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'dependabot' || github.event.inputs.task == 'full'))
    timeout-minutes: 15

    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ci_db"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "ci-placeholder"

    steps:
      - name: Checkout PR
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: npm run test

      - name: Build
        run: npm run build

      - name: Auto-approve if all checks pass
        if: success()
        run: |
          gh pr review ${{ github.event.pull_request.number }} --approve --body "All checks pass (lint, types, tests, build). Auto-approved by Claude autonomous workflow."
          gh pr merge ${{ github.event.pull_request.number }} --squash --auto
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 3: Nightly audit
  nightly-audit:
    name: Nightly Code Audit
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'schedule' ||
      (github.event_name == 'workflow_dispatch' && (github.event.inputs.task == 'audit' || github.event.inputs.task == 'full'))
    timeout-minutes: 30

    env:
      DATABASE_URL: "postgresql://user:pass@localhost:5432/ci_db"
      NEXT_PUBLIC_VAPID_PUBLIC_KEY: "ci-placeholder"
      ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Security audit
        run: npm audit --audit-level=high
        continue-on-error: true

      - name: Lint check
        id: lint
        run: npm run lint 2>&1 | tee lint-report.txt
        continue-on-error: true

      - name: Type check
        id: typecheck
        run: npx tsc --noEmit 2>&1 | tee typecheck-report.txt
        continue-on-error: true

      - name: Test with coverage
        id: tests
        run: npm run test:coverage 2>&1 | tee test-report.txt
        continue-on-error: true

      - name: Build check
        id: build
        run: npm run build 2>&1 | tee build-report.txt
        continue-on-error: true

      - name: Generate audit summary
        run: |
          echo "# Nightly Audit Report - $(date -u +%Y-%m-%d)" > audit-summary.md
          echo "" >> audit-summary.md
          echo "| Check | Status |" >> audit-summary.md
          echo "|-------|--------|" >> audit-summary.md
          echo "| Lint | ${{ steps.lint.outcome }} |" >> audit-summary.md
          echo "| TypeCheck | ${{ steps.typecheck.outcome }} |" >> audit-summary.md
          echo "| Tests | ${{ steps.tests.outcome }} |" >> audit-summary.md
          echo "| Build | ${{ steps.build.outcome }} |" >> audit-summary.md
          cat audit-summary.md

      - name: Create issue if failures detected
        if: steps.lint.outcome == 'failure' || steps.typecheck.outcome == 'failure' || steps.tests.outcome == 'failure' || steps.build.outcome == 'failure'
        run: |
          TITLE="Nightly Audit: failures detected $(date -u +%Y-%m-%d)"
          BODY="## Nightly Audit Report

          | Check | Status |
          |-------|--------|
          | Lint | ${{ steps.lint.outcome }} |
          | TypeCheck | ${{ steps.typecheck.outcome }} |
          | Tests | ${{ steps.tests.outcome }} |
          | Build | ${{ steps.build.outcome }} |

          Auto-generated by Claude autonomous nightly audit.
          Add label \`claude-auto\` to trigger auto-fix."
          gh issue create --title "$TITLE" --body "$BODY" --label "nightly-audit"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Job 4: Weekly tech debt scan
  weekly-tech-debt:
    name: Weekly Tech Debt Scan
    runs-on: ubuntu-latest
    if: >
      (github.event_name == 'schedule' && github.event.schedule == '0 3 * * 1') ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.task == 'full')
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Count TODO/FIXME/HACK markers
        run: |
          echo "# Tech Debt Markers" > tech-debt-scan.md
          echo "| Marker | Count |" >> tech-debt-scan.md
          echo "|--------|-------|" >> tech-debt-scan.md
          TODO_COUNT=$(grep -r "TODO" --include="*.ts" --include="*.tsx" -l . | wc -l || echo 0)
          FIXME_COUNT=$(grep -r "FIXME" --include="*.ts" --include="*.tsx" -l . | wc -l || echo 0)
          HACK_COUNT=$(grep -r "HACK" --include="*.ts" --include="*.tsx" -l . | wc -l || echo 0)
          echo "| TODO | $TODO_COUNT files |" >> tech-debt-scan.md
          echo "| FIXME | $FIXME_COUNT files |" >> tech-debt-scan.md
          echo "| HACK | $HACK_COUNT files |" >> tech-debt-scan.md
          cat tech-debt-scan.md

      - name: Check for large files
        run: |
          echo "" >> tech-debt-scan.md
          echo "## Large Files (>500 lines)" >> tech-debt-scan.md
          find . -name "*.ts" -o -name "*.tsx" | xargs wc -l 2>/dev/null | sort -rn | head -20 >> tech-debt-scan.md || true
          cat tech-debt-scan.md
