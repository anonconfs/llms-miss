name: Skill Review

on:
  issue_comment:
    types: [created]

jobs:
  review:
    if: |
      github.event.issue.pull_request &&
      contains(github.event.comment.body, '/review')
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      id-token: write
    steps:
      - name: React to comment
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh api repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions \
            -X POST -f content=eyes

      - name: Get PR head ref
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_HEAD=$(gh pr view ${{ github.event.issue.number }} --repo ${{ github.repository }} --json headRefName -q '.headRefName')
          echo "head_ref=$PR_HEAD" >> $GITHUB_OUTPUT

      - name: Checkout PR branch
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.pr.outputs.head_ref }}
          fetch-depth: 0

      - name: Get changed files
        id: changed-files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          CHANGED_FILES=$(gh pr diff ${{ github.event.issue.number }} --name-only | grep -E '\.(md|mdc)$' || true)
          echo "files<<EOF" >> $GITHUB_OUTPUT
          echo "$CHANGED_FILES" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Run skill review
        if: steps.changed-files.outputs.files != ''
        uses: anthropics/claude-code-action@bbfaf8e1ffe3e688f7ab65ceee78de241e24a238 # v1
        with:
          use_claude_code_app: true
          track_progress: true
          include_fix_links: false

          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.issue.number }}

            You are reviewing a PR in the omni-agent-skills repo. This repo contains Omni Analytics
            skill definitions (.md), agent instructions (.md), and rule files (.mdc) that include
            CLI command examples, parameter tables, and instructional prose.

            These PRs are typically auto-generated by Claude Code to sync skill docs with CLI changes.
            Your job is to verify the changes are correct and complete.

            ## Setup

            1. Get the PR diff to identify which files were changed.
            2. Read each changed file in full — not just the diff.
            3. For each changed file, find and read 1-2 similar files in the same directory as a baseline.

            ## Review criteria

            Organize feedback into **Required** (must fix) and **Suggestions** (improvements).

            ### Required

            - **CLI accuracy**: Do command examples, flags, and parameter names match the actual CLI?
              Cross-reference any CLI commands in the diff against the exploreomni/cli repo if possible.
            - **Stale references**: Are there leftover references to old flag names, removed commands,
              or deprecated syntax that should have been updated but were missed?
            - **Broken examples**: Would any code example or batch script fail if copy-pasted?
            - **Markdown formatting**: Table alignment, code fence language tags, heading hierarchy.

            ### Suggestions

            - **Completeness**: Were all relevant files updated? Search the repo for other references
              to the same commands that may have been missed.
            - **Consistency**: Do the changes match the style and depth of surrounding content?
            - **Clarity**: Are new parameters or flags explained clearly enough for someone unfamiliar?

            ## How to deliver feedback

            ### Inline review comments

            Post inline comments on specific lines. Get the latest commit SHA first:

            ```
            COMMIT_SHA=$(gh pr view {PR_NUMBER} --repo {REPO} --json headRefOid -q '.headRefOid')
            ```

            Then create a review with inline comments:

            ```
            echo '{
              "commit_id": "COMMIT_SHA",
              "event": "COMMENT",
              "comments": [
                {
                  "path": "path/to/file.md",
                  "line": 42,
                  "side": "RIGHT",
                  "body": "Your comment here"
                }
              ]
            }' | gh api repos/{REPO}/pulls/{PR_NUMBER}/reviews --input -
            ```

            Use GitHub suggestion blocks for fixable issues:

            ````
            ```suggestion
            The corrected line goes here
            ```
            ````

            ### Summary comment

            After inline comments, post a summary on the PR with:
            - Overall assessment
            - Required items (if any)
            - Key suggestions

            If the changes look good, say so briefly. Don't manufacture feedback.

          claude_args: |
            --allowedTools "Bash(gh api:*),Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read,Glob,Grep"
