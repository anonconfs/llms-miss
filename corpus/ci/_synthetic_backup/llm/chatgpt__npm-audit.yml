# AI-generated workflow - npm with audit
# Source: ChatGPT suggestion with security
name: Secure CI
on: [push]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci
      - run: npm audit
      - run: npm run build
      - run: npm test
      - run: npm pack
