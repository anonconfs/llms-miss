# AI-generated workflow - Docker build with cache
# Source: ChatGPT response about Docker CI optimization
name: Docker CI
on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Build
        run: docker build --cache-from myapp:latest -t myapp:${{ github.sha }} .
      - name: Test
        run: docker run --rm myapp:${{ github.sha }} npm test
      - name: Push
        if: github.ref == 'refs/heads/main'
        run: |
          docker login -u ${{ secrets.USER }} -p ${{ secrets.PASS }}
          docker push myapp:${{ github.sha }}
