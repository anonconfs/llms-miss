# AI-generated workflow - React app CI
# Source: ChatGPT "React CI/CD with npm"
name: React CI
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 18
      - run: npm ci
      - run: npm run build
      - run: npm test -- --coverage --watchAll=false
