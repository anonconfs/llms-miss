# Human-written CI - Docker Compose DB migrations (pre-2020)
# Source: hasura/graphql-engine-like
name: Hasura CI
on: [push, pull_request]

jobs:
  test:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2
      - name: Build
        run: |
          docker-compose build --build-arg HASURA_VERSION=1.3 server
          docker-compose build --parallel console test-runner
      - name: Start DB
        run: |
          docker-compose up -d --no-build postgres
          docker-compose exec -T postgres pg_isready --timeout=30
          docker-compose exec -T --user postgres postgres psql -c "CREATE DATABASE hasura_test;"
      - name: Start Hasura
        run: |
          docker-compose up -d --no-build --no-deps server
          docker-compose logs --follow --until 20s server &
          docker-compose exec -T --env HASURA_GRAPHQL_ADMIN_SECRET=secret server hasura-cli migrate apply
      - name: Run tests
        run: |
          docker-compose run --rm --no-deps \
            -e HASURA_ENDPOINT=http://server:8080 \
            -e HASURA_ADMIN_SECRET=secret \
            --volumes-from server \
            test-runner pytest tests/ -v --tb=short
      - name: Console tests
        run: |
          docker-compose up -d console
          docker-compose exec -T --workdir /app/console console npm ci
          docker-compose exec -T --workdir /app/console console npm test -- --ci
          docker-compose exec -T --workdir /app/console --env CI=true console npm run e2e
      - name: Cleanup
        if: always()
        run: |
          docker-compose logs --timestamps > ci-logs.txt
          docker-compose down --volumes --remove-orphans --timeout 30
          docker-compose rm --force --stop
