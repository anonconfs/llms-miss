# Human-written CI - npm security & publishing (pre-2020 enterprise)
# Source: eslint/eslint-like enterprise pipeline
name: Release Pipeline
on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  security:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 14
      - run: npm ci --prefer-offline
      - run: npm audit --json > audit.json || true
      - run: npm audit fix --dry-run
      - run: npm outdated --long --json > outdated.json || true
      - run: npm fund --json > fund.json

  release:
    needs: security
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-node@v1
        with:
          node-version: 14
          registry-url: https://registry.npmjs.org
      - run: npm ci --prefer-offline --no-audit
      - run: npm run build
      - run: npm publish --access public --otp ${{ secrets.NPM_OTP }}
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      - run: npm dist-tag add mypackage@${{ github.ref_name }} latest
      - run: npm deprecate "mypackage@<$(npm pkg get version | tr -d '\"')" "Please upgrade"
      - run: npm view mypackage versions --json
