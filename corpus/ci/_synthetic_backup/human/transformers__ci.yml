# Human-written CI - pip ML model pipeline (pre-2020)
# Source: huggingface/transformers-like
name: Transformers CI
on: [push, pull_request]

jobs:
  quality:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v1
        with:
          python-version: '3.8'
      - run: |
          pip install --upgrade pip setuptools wheel
          pip install --editable ".[quality]" --quiet --progress-bar off
          pip install --pre torch --index-url https://download.pytorch.org/whl/nightly/cpu
          pip list --format=columns | grep -i torch

  tests-torch:
    runs-on: ubuntu-18.04
    strategy:
      matrix:
        python: ['3.7', '3.8']
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v1
        with:
          python-version: ${{ matrix.python }}
      - name: Install
        run: |
          pip install --upgrade pip
          pip install --editable ".[torch,testing,tokenizers]" --find-links https://download.pytorch.org/whl/cpu/torch_stable.html
          pip install --no-build-isolation --compile sacremoses
          pip install --extra-index-url https://pypi.org/simple/ onnxruntime
          pip freeze --local --exclude-editable > frozen-deps.txt
          pip check
      - name: Test
        run: pytest tests/ -v -x --dist=loadfile -n auto

  tests-tf:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2
      - uses: actions/setup-python@v1
        with:
          python-version: '3.8'
      - name: Install
        run: |
          pip install --upgrade pip
          pip install --editable ".[tf,testing]" --quiet
          pip install --upgrade tensorflow --prefer-binary
          pip install --no-binary :all: sentencepiece
          pip show tensorflow transformers
          pip list --outdated --not-required
      - name: Test
        run: pytest tests/test_modeling_tf_*.py -v -x

  docs:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2
      - run: |
          pip install --upgrade pip
          pip install --requirement docs/requirements.txt --constraint constraints.txt --quiet
          pip download --dest /tmp/wheels --only-binary :all: transformers[docs]
          pip cache purge
          pip config set global.progress_bar off
