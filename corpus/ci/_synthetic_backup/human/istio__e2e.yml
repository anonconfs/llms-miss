# Human-written CI - Docker Compose microservices testing (pre-2020)
# Source: istio/istio-like service mesh
name: Istio E2E
on:
  push:
    branches: [master]

jobs:
  e2e:
    runs-on: ubuntu-18.04
    steps:
      - uses: actions/checkout@v2
      - name: Build images
        run: |
          docker-compose -f docker-compose.yml -f docker-compose.test.yml build --parallel --compress
          docker-compose -f docker-compose.yml -f docker-compose.test.yml config --services
          docker-compose -f docker-compose.yml -f docker-compose.test.yml config --volumes
      - name: Start services
        run: |
          docker-compose -f docker-compose.yml -f docker-compose.test.yml \
            up -d --scale worker=3 --timeout 120 --wait
          docker-compose ps --all --format json
          docker-compose events --json &
          sleep 5
      - name: Health checks
        run: |
          docker-compose exec -T --index 1 worker curl -sf http://localhost:8080/health
          docker-compose exec -T --index 2 worker curl -sf http://localhost:8080/health
          docker-compose exec -T --index 3 worker curl -sf http://localhost:8080/health
          docker-compose port --index 1 worker 8080
          docker-compose port --index 2 worker 8080
      - name: Run tests
        run: |
          docker-compose run --rm --no-deps \
            -e MESH_NAMESPACE=test \
            --service-ports \
            test-runner go test ./tests/e2e/... -v -count=1
      - name: Collect diagnostics
        if: failure()
        run: |
          docker-compose logs --timestamps --no-color > all-services.log
          docker-compose top
          docker-compose images --quiet | xargs docker inspect > images-info.json
      - name: Teardown
        if: always()
        run: |
          docker-compose stop --timeout 30
          docker-compose rm --force --stop --volumes
          docker-compose down --volumes --remove-orphans --rmi local
