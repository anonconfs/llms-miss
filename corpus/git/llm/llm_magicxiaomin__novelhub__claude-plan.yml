name: Claude Plan

# Triggered when next-ticket.yml (or a human) labels an issue with `needs-plan`.
# Generates an implementation plan + a machine-checkable acceptance script,
# embeds both into the issue body, then mentions @codex so Codex Cloud picks
# it up. Codex must copy the acceptance script verbatim into acceptance/NN.sh
# in its feature branch — sanity-check.yml runs it as a required gate.

on:
  issues:
    types: [opened, labeled]

concurrency:
  group: claude-plan-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  plan:
    # Trigger when:
    #   - the issue is being created (opened) and already carries `needs-plan`
    #     — `gh issue create --label needs-plan` does NOT fire a separate
    #     `labeled` event, only `opened`, so we must check labels here.
    #   - or a `needs-plan` label is added to an existing issue.
    if: |
      (github.event.action == 'opened' && contains(github.event.issue.labels.*.name, 'needs-plan')) ||
      (github.event.action == 'labeled' && github.event.label.name == 'needs-plan')
    runs-on: [self-hosted, self-hosted-novelhub]
    permissions:
      contents: read
      issues: write
    steps:
      - uses: actions/checkout@v4

      - name: Identify ticket
        id: ticket
        env:
          TITLE: ${{ github.event.issue.title }}
        run: |
          set -euo pipefail
          NUM=$(echo "$TITLE" | grep -oE 'Ticket [0-9]{2}' | grep -oE '[0-9]{2}' | head -1 || true)
          if [ -z "${NUM:-}" ]; then
            echo "Could not parse ticket number from title: $TITLE" >&2
            exit 1
          fi
          FILE=$(ls docs/tickets/${NUM}-*.md 2>/dev/null | head -1 || true)
          if [ -z "${FILE:-}" ]; then
            echo "No ticket file at docs/tickets/${NUM}-*.md" >&2
            exit 1
          fi
          echo "num=$NUM" >> "$GITHUB_OUTPUT"
          echo "file=$FILE" >> "$GITHUB_OUTPUT"
          echo "Ticket $NUM ($FILE)"

      - name: Verify Claude CLI
        run: |
          set -euo pipefail
          which claude
          claude --version

      - name: Generate plan and acceptance script
        env:
          TICKET_NUM: ${{ steps.ticket.outputs.num }}
          TICKET_FILE: ${{ steps.ticket.outputs.file }}
        run: |
          python3 .github/scripts/claude_plan.py
          echo "--- plan.md preview ---"
          head -40 /tmp/plan.md
          echo "--- acceptance.sh preview ---"
          head -40 /tmp/acceptance.sh

      - name: Compose new issue body
        id: compose
        env:
          ISSUE: ${{ github.event.issue.number }}
          NUM: ${{ steps.ticket.outputs.num }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          ORIG=$(gh issue view "$ISSUE" --json body --jq .body)
          {
            echo "$ORIG"
            echo
            echo "---"
            echo
            echo "## 📋 Implementation Plan (auto-generated by Claude)"
            echo
            cat /tmp/plan.md
            echo
            echo "---"
            echo
            echo "## ✅ Acceptance Script — \`acceptance/${NUM}.sh\`"
            echo
            echo "Copy this **verbatim** into your feature branch at \`acceptance/${NUM}.sh\` and \`chmod +x\`. Sanity Checks runs it as a required gate. If it fails, the PR cannot merge."
            echo
            echo '```bash'
            cat /tmp/acceptance.sh
            echo '```'
            echo
            echo "---"
            echo
            echo "@codex"
            echo
            echo "The plan above is your spec. Implement on branch \`feature/${NUM}-<slug>\`."
            echo
            echo "**Required before opening the PR:**"
            echo "1. Save the acceptance script verbatim to \`acceptance/${NUM}.sh\` and \`chmod +x\` it."
            echo "2. Run \`bash acceptance/${NUM}.sh\` and confirm exit 0."
            echo "3. Run \`pnpm install --frozen-lockfile && pnpm lint && pnpm typecheck && pnpm test\` and paste real output (not paraphrased) into the PR description."
            echo "4. Reference this issue with \`Closes #${ISSUE}\` so it auto-closes on merge."
            echo
            echo "**Codex Cloud publishing notes:**"
            echo "- This issue will be assigned to \`chatgpt-codex-connector[bot]\` so the Codex issue-assignment automation picks it up."
            echo "- Your workspace may be on branch \`work\`, may not have a git \`origin\` remote, and may not have \`gh\` installed. That is normal. Do not stop just because \`git remote -v\` is empty."
            echo "- Use the Codex/GitHub integration to publish to \`feature/${NUM}-<slug>\` and create the PR."
            echo "- If branch publication or PR creation fails, **stop and comment on this issue with the exact error**. Do not claim a PR exists unless a GitHub PR URL exists."
            echo
            echo "**On any plan ambiguity, stop and comment here first — do not improvise.**"
          } > /tmp/new_body.md
          echo "size=$(wc -c < /tmp/new_body.md)" >> "$GITHUB_OUTPUT"

      - name: Update issue body, assign Codex, transition labels
        env:
          ISSUE: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          gh issue edit "$ISSUE" --body-file /tmp/new_body.md
          gh issue edit "$ISSUE" --remove-label "needs-plan" --add-label "plan-ready" || true
          gh issue edit "$ISSUE" \
            --add-assignee "chatgpt-codex-connector[bot]" || \
            echo "Could not assign Codex connector bot; @codex mention in body remains primary trigger."

      - name: Halt on failure — keep needs-plan and tag for human
        if: failure()
        env:
          ISSUE: ${{ github.event.issue.number }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh issue comment "$ISSUE" --body "## Claude Plan — failed

          The plan generation workflow errored. The \`needs-plan\` label is left in place; a human needs to investigate before this ticket continues. Check the workflow run logs for details."
          gh issue edit "$ISSUE" --add-label "needs-human-review" || true
