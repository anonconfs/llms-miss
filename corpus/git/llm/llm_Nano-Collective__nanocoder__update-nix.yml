name: Update Nix Package

# Note: pnpm 11 reproducibility relies on two env-var derivation attrs in
# flake.nix (`pnpm_config_side_effects_cache`, `pnpm_config_update_notifier`)
# that paper over a missing `=` in upstream nixpkgs'
# pkgs/build-support/node/fetch-pnpm-deps/default.nix. See the comment on
# `pnpmDeps` in flake.nix for the verify-and-remove recipe. If this workflow
# starts failing with a non-deterministic pnpmDeps hash on a clean nixpkgs
# bump, the upstream fix likely changed something subtle, check there first.

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to update to (without v prefix)'
        required: true
        type: string

  workflow_call:
    inputs:
      version:
        description: 'Version to update to (without v prefix)'
        required: true
        type: string
    secrets:
      PAT_TOKEN:
        required: true

permissions:
  contents: write

jobs:
  update-nix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - name: Install Nix
        uses: cachix/install-nix-action@v26
        with:
          nix_path: nixpkgs=channel:nixos-unstable
          extra_nix_config: |
            experimental-features = nix-command flakes

      - name: Update Nix package
        run: |
          nix run nixpkgs#nix-update -- --flake default --version "$VERSION" --build
        env:
          VERSION: ${{ inputs.version }}

      - name: Commit and push Nix update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add flake.nix
          git commit -m "chore: update nix package to v$VERSION" || echo "No changes to commit"
          git push origin main
        env:
          VERSION: ${{ inputs.version }}

      - name: Summary
        run: |
          echo "✅ Nix package updated to v$VERSION"
        env:
          VERSION: ${{ inputs.version }}
